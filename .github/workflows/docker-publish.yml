name: Publish Docker image

# Builds and pushes ghcr.io/ninjahawk/hollow-agentos on every push to main
# and on every versioned release tag (v*).
#
# The image is public and requires no authentication to pull.
# Uses GitHub Actions layer cache so incremental rebuilds are fast.

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:   # allow manual trigger from the Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ninjahawk/hollow-agentos

jobs:
  build-and-push:
    name: Build & push (api)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # always push :latest from main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # versioned tag from git tag  e.g. v4.1.0 → :4.1.0 and :4.1 and :4
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # short SHA for traceability
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache dramatically speeds up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Multi-arch: build for both x86 and Apple Silicon / ARM servers
          platforms: linux/amd64,linux/arm64

  build-and-push-store:
    name: Build & push (store)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (store tags)
        id: meta-store
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/hollow-store
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push store
        uses: docker/build-push-action@v5
        with:
          context: .
          file: store/Dockerfile
          push: true
          tags: ${{ steps.meta-store.outputs.tags }}
          labels: ${{ steps.meta-store.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
