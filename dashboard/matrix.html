<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hollow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Noto+Sans+JP:wght@400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #080808; }
body { font-family: 'JetBrains Mono', monospace; }

canvas { position: fixed; inset: 0; display: block; }

/* Token overlay */
#overlay {
  position: fixed; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(30px);
}
#overlay.gone { display: none; }
#sheet {
  width: 300px; text-align: center;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  background: rgba(18,18,18,0.95);
  padding: 28px 24px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.9);
}
#sheet h2 { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.85); letter-spacing: 0.5px; margin-bottom: 5px; }
#sheet p  { font-size: 10px; color: rgba(255,255,255,0.25); margin-bottom: 18px; line-height: 1.6; }
#ti {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 9px;
  color: rgba(255,255,255,0.85); font-family: inherit; font-size: 11px;
  padding: 10px 12px; outline: none; margin-bottom: 10px;
  transition: border-color 0.2s;
}
#ti:focus { border-color: rgba(48,209,88,0.4); }
#ti::placeholder { color: rgba(255,255,255,0.2); }
#tb {
  width: 100%; background: #30d158; border: none; border-radius: 9px;
  color: #000; font-family: inherit; font-size: 12px; font-weight: 400;
  padding: 10px; cursor: pointer; transition: opacity 0.15s;
}
#tb:hover { opacity: 0.82; }

/* HUD overlays — rendered on top of canvas via DOM */
#hud {
  position: fixed; inset: 0; z-index: 10;
  pointer-events: none;
  display: flex; flex-direction: column;
  justify-content: space-between;
}

/* Zone labels */
#zone-labels {
  display: flex; padding: 18px 0 0;
}
.zlabel {
  flex: 1; text-align: center;
  font-size: 9px; font-weight: 400;
  letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.12);
  transition: color 1s;
}
.zlabel.hot { color: rgba(255,255,255,0.35); }

/* Zone dividers — drawn on canvas, but also faint DOM lines */
.zdiv {
  position: absolute; top: 0; bottom: 0;
  width: 1px; background: rgba(255,255,255,0.03);
}

/* Bottom status bar */
#statusbar {
  padding: 0 24px 20px;
  display: flex; align-items: flex-end; justify-content: space-between;
}
#current-action {
  font-size: 11px; font-weight: 300;
  color: rgba(255,255,255,0.7);
  letter-spacing: 0.3px;
  max-width: 60%;
  transition: opacity 0.8s;
}
#current-action.fade { opacity: 0; }
#meta {
  text-align: right;
  display: flex; flex-direction: column; gap: 3px; align-items: flex-end;
}
.meta-row { font-size: 9px; color: rgba(255,255,255,0.15); letter-spacing: 1px; }
.meta-row b { color: rgba(255,255,255,0.3); font-weight: 400; }

/* Progress arcs — drawn via canvas overlay, but pct text in DOM */
#progress-wrap {
  position: fixed; bottom: 60px; left: 0; right: 0;
  z-index: 11; pointer-events: none;
  display: flex;
}
.pzone {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.pbar {
  width: 60%; height: 1px;
  background: rgba(255,255,255,0.06); border-radius: 1px;
  overflow: hidden;
}
.pfill {
  height: 100%; border-radius: 1px;
  background: #30d158;
  box-shadow: 0 0 6px #30d158;
  transition: width 2s cubic-bezier(0.4,0,0.2,1);
}
.ppct {
  font-size: 9px; color: rgba(48,209,88,0.5);
  letter-spacing: 1px;
  transition: opacity 0.5s;
}
.ppct.hidden { opacity: 0; }
</style>
</head>
<body>

<div id="overlay">
  <div id="sheet">
    <h2>Hollow</h2>
    <p>API token to connect.<br>Found in config.json</p>
    <input id="ti" type="password" placeholder="token" autocomplete="off"/>
    <button id="tb">Connect</button>
  </div>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div id="zone-labels">
    <div class="zlabel" id="zl-0">analyst</div>
    <div class="zlabel" id="zl-1">scout</div>
    <div class="zlabel" id="zl-2">builder</div>
  </div>
  <div id="statusbar">
    <div id="current-action">—</div>
    <div id="meta">
      <div class="meta-row"><b id="m-model">—</b></div>
      <div class="meta-row"><b id="m-time">—</b></div>
    </div>
  </div>
</div>

<div id="progress-wrap">
  <div class="pzone">
    <div class="pbar"><div class="pfill" id="pf-0" style="width:0%"></div></div>
    <div class="ppct hidden" id="pp-0"></div>
  </div>
  <div class="pzone">
    <div class="pbar"><div class="pfill" id="pf-1" style="width:0%"></div></div>
    <div class="ppct hidden" id="pp-1"></div>
  </div>
  <div class="pzone">
    <div class="pbar"><div class="pfill" id="pf-2" style="width:0%"></div></div>
    <div class="ppct hidden" id="pp-2"></div>
  </div>
</div>

<script>
// ── Canvas setup ──────────────────────────────────────────────────────────────
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');

let W, H, FS, ncols, colW;

function resize() {
  W = cv.width  = innerWidth;
  H = cv.height = innerHeight;
  FS    = 16;
  ncols = Math.floor(W / FS);
  colW  = W / 3;
  initColumns();
}

// ── Column state ──────────────────────────────────────────────────────────────
const AGENTS = ['analyst', 'scout', 'builder'];

// Full-width katakana — requires a Japanese font to render correctly
const CH = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン０１２３４５６７８９';

let cols = [];

const zoneActivity = [0, 0, 0];   // 0-1 transient activity
const zoneFlash    = [0, 0, 0];   // 0-1 flash pulse on action complete
const zoneActive   = [false, false, false];

// Gap columns between zones (1 col wide) — subtle natural separation
const GAP = 1;

const TRAIL = 20;  // number of trail steps to keep

function initColumns() {
  cols = [];
  const usable = ncols - GAP * 2;
  const zw     = Math.floor(usable / 3);

  for (let i = 0; i < ncols; i++) {
    const b1 = zw, b2 = zw + GAP, b3 = zw * 2 + GAP, b4 = zw * 2 + GAP * 2;
    const zone  = i < b1 ? 0 : i < b2 ? -1 : i < b3 ? 1 : i < b4 ? -1 : 2;

    cols.push({
      x:      i * FS,
      drop:   Math.random() * -H,
      speed:  0.5 + Math.random() * 0.8,
      zone,
      gap:    zone === -1,
      trail:  [],   // [{y, ch}] newest first
      surface: null,
    });
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  // Full clear every frame — no accumulation, no ghost trails
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);

  ctx.font = `${FS}px 'Noto Sans JP', 'Yu Gothic', 'MS Gothic', monospace`;

  for (let i = 0; i < cols.length; i++) {
    const col  = cols[i];
    if (col.gap) continue;

    const zone  = col.zone;
    const act   = zoneActivity[zone];
    const flash = zoneFlash[zone];

    // Advance head
    const spd = col.speed * (0.7 + act * 1.4);
    col.drop += spd * FS * 0.38;
    if (col.drop > H && Math.random() > 0.972) {
      col.drop = Math.random() * -H * 0.4;
      col.trail = [];
    }

    // Push new head position into trail
    const headY = Math.floor(col.drop);
    col.trail.unshift({ y: headY, ch: CH[Math.floor(Math.random() * CH.length)] });
    if (col.trail.length > TRAIL) col.trail.length = TRAIL;

    // Color tones: flash shifts toward white-green
    const r = Math.floor(30  + act * 40  + flash * 160);
    const g = Math.floor(185 + act * 55  + flash * 55);
    const b = Math.floor(30  + act * 20  + flash * 160);

    // Draw trail from oldest to newest (so head paints on top)
    for (let t = col.trail.length - 1; t >= 0; t--) {
      const { y, ch } = col.trail[t];
      const frac = 1 - t / TRAIL;           // 1 = head, 0 = tail
      const alpha = t === 0
        ? Math.min(1, 0.55 + act * 0.35 + flash * 0.45)   // head: always bright
        : frac * frac * (0.25 + act * 0.15 + flash * 0.3); // trail: quadratic falloff

      ctx.fillStyle = `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
      ctx.fillText(ch, col.x, y);
    }

    // Surface text: a word/action emerges in this column
    if (col.surface) {
      const s = col.surface;
      s.alpha -= 0.008;
      if (s.alpha <= 0) {
        col.surface = null;
      } else {
        ctx.fillStyle = s.color.replace('A', s.alpha.toFixed(2));
        for (let ci = 0; ci < s.chars.length; ci++) {
          ctx.fillText(s.chars[ci], col.x, s.y + ci * FS);
        }
      }
    }
  }
}

// ── Surface text: make a word emerge from a zone ──────────────────────────────
function surface(zoneIdx, text, isSpecial) {
  const zoneCols = cols.filter(c => c.zone === zoneIdx);
  if (!zoneCols.length) return;

  // Pick a random column in zone, near center
  const mid   = zoneCols[Math.floor(zoneCols.length / 2)];
  const range = zoneCols.slice(
    Math.max(0, zoneCols.length/2 - 4),
    Math.min(zoneCols.length, zoneCols.length/2 + 4)
  );
  const col = range[Math.floor(Math.random() * range.length)];

  const chars  = text.slice(0, 18).split('');
  const startY = H * 0.25 + Math.random() * H * 0.4;
  const color  = isSpecial
    ? 'rgba(255,214,10,A)'
    : 'rgba(200,255,200,A)';

  col.surface = { chars, y: startY, alpha: 1.0, color };
}

// ── Status bar ────────────────────────────────────────────────────────────────
const actionEl = document.getElementById('current-action');
let   actionTimer = null;

function setAction(text, special) {
  actionEl.classList.remove('fade');
  actionEl.textContent = text;
  actionEl.style.color = special ? 'rgba(255,214,10,0.85)' : 'rgba(255,255,255,0.65)';
  clearTimeout(actionTimer);
  actionTimer = setTimeout(() => actionEl.classList.add('fade'), 6000);
}

// ── Auth ──────────────────────────────────────────────────────────────────────
const API = 'http://localhost:7777';
let TOKEN = localStorage.getItem('hollow-token') || '';

document.getElementById('tb').onclick = connect;
document.getElementById('ti').onkeydown = e => { if (e.key==='Enter') connect(); };

function connect() {
  const t = document.getElementById('ti').value.trim();
  if (!t) return;
  TOKEN = t;
  localStorage.setItem('hollow-token', TOKEN);
  document.getElementById('overlay').classList.add('gone');
  start();
}

if (TOKEN) { document.getElementById('overlay').classList.add('gone'); }

async function api(path) {
  try {
    const r = await fetch(API + path, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    return r.ok ? r.json() : null;
  } catch(_) { return null; }
}

// ── Zone activity + flash decay ───────────────────────────────────────────────
setInterval(() => {
  for (let z = 0; z < 3; z++) {
    zoneActivity[z] = Math.max(0, zoneActivity[z] - 0.05);
    zoneFlash[z]    = Math.max(0, zoneFlash[z]    - 0.06);
  }
}, 80);

function activateZone(z, amount, flash) {
  zoneActivity[z] = Math.min(1, zoneActivity[z] + amount);
  if (flash) zoneFlash[z] = 1.0;
  document.getElementById(`zl-${z}`).className = 'zlabel' + (zoneActivity[z] > 0.15 ? ' hot' : '');
}

// ── Progress bars ─────────────────────────────────────────────────────────────
function setProgress(z, pct, steps) {
  document.getElementById(`pf-${z}`).style.width = pct + '%';
  const pp = document.getElementById(`pp-${z}`);
  if (pct > 0) {
    pp.textContent = pct + '%';
    pp.classList.remove('hidden');
  } else {
    pp.classList.add('hidden');
  }
}

// ── Poll goals ────────────────────────────────────────────────────────────────
async function pollGoals() {
  for (let z = 0; z < AGENTS.length; z++) {
    const d = await api(`/goals/${AGENTS[z]}`);
    if (!d) continue;
    const active = (d.goals||[]).filter(g=>g.status==='active');
    const best   = active.sort((a,b)=>(b.metrics?.progress||0)-(a.metrics?.progress||0))[0];

    if (best) {
      const pct = Math.round((best.metrics?.progress||0)*100);
      setProgress(z, pct, best.metrics?.steps_completed||0);
      if (!zoneActive[z]) {
        activateZone(z, 0.4);
        zoneActive[z] = true;
      }
    } else {
      setProgress(z, 0, 0);
      zoneActive[z] = false;
    }
  }
}

// ── Poll actions ──────────────────────────────────────────────────────────────
let lastTs = null;

const ACTION_FMT = {
  shell_command: d => ({ text: d.command ? d.command.slice(0,60) : 'shell', zone: -1, special: false }),
  ollama_chat:   d => ({ text: d.prompt  ? d.prompt.slice(0,60)  : 'model call', zone: -1, special: false }),
  memory_set:    d => ({ text: `store ${d.key||''}`, zone: -1, special: false }),
  fs_write:      d => ({ text: `write ${d.path||''}`, zone: -1, special: false }),
  goal_created:  d => ({ text: (d.objective||'new goal').slice(0,60), zone: -1, special: false }),
  capability_deployed: d => ({ text: `deployed: ${d.name||'capability'}`, zone: -1, special: true }),
};

async function pollActions() {
  const d = await api('/memory/actions?n=60');
  if (!d?.actions) return;

  const newOnes = lastTs
    ? d.actions.filter(a => new Date(a.timestamp) > new Date(lastTs))
    : d.actions.slice(-8);
  if (!newOnes.length) return;
  lastTs = newOnes[newOnes.length-1].timestamp;

  for (const a of newOnes) {
    const fmt = ACTION_FMT[a.action];
    if (!fmt) continue;
    const { text, special } = fmt(a.details||{});

    // Pick a zone at random, weighted by activity
    const weights = zoneActivity.map(v => 0.2 + v);
    const total   = weights.reduce((s,v)=>s+v,0);
    let rand = Math.random() * total, zone = 0;
    for (let z = 0; z < 3; z++) { rand -= weights[z]; if (rand <= 0) { zone = z; break; } }

    const isFlash = special || a.action === 'fs_write' || a.action === 'capability_deployed';
    activateZone(zone, special ? 0.9 : 0.3, isFlash);
    surface(zone, text, special);
    setAction(text, special);
  }
}

// ── Poll state ────────────────────────────────────────────────────────────────
async function pollState() {
  const d = await api('/state?fields=ollama');
  if (!d) return;
  const model = d.ollama?.running?.[0];
  document.getElementById('m-model').textContent =
    typeof model === 'string' ? model : (model?.name || '—');
}

function clock() {
  document.getElementById('m-time').textContent = new Date().toTimeString().slice(0,8);
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let tick = 0;
async function loop() {
  tick++;
  clock();
  await Promise.all([pollGoals(), pollActions()]);
  if (tick % 8 === 0) pollState();
}

function start() {
  pollState();
  loop();
  setInterval(loop, 4000);
  setInterval(clock, 1000);
}

resize();
addEventListener('resize', resize);

// Wait for Japanese font to load before drawing so katakana renders correctly
document.fonts.load(`16px 'Noto Sans JP'`).finally(() => {
  requestAnimationFrame(function frame() { draw(); requestAnimationFrame(frame); });
});

if (TOKEN) start();
</script>
</body>
</html>
