<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>hollow — matrix monitor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#rain {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

#scanlines {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
  );
}

#ui {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  height: 100vh; padding: 14px; gap: 10px;
}

/* Header */
#header {
  display: flex; align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #0d3a0d;
  padding-bottom: 10px; flex-shrink: 0;
}
#logo {
  font-size: 20px; font-weight: bold;
  color: #00ff41; letter-spacing: 5px;
  text-shadow: 0 0 14px #00ff41, 0 0 28px #00882a;
}
#header-right {
  display: flex; gap: 30px;
  font-size: 11px; color: #1a5a1a; letter-spacing: 1px;
}
#header-right b { color: #00cc33; font-weight: normal; }
.pdot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: #00ff41;
  box-shadow: 0 0 8px #00ff41; margin-right: 10px;
  animation: blink 1.6s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Agent panels */
#panels {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px; flex-shrink: 0;
}

.panel {
  background: rgba(0,6,0,0.85);
  border: 1px solid #0a2a0a; border-radius: 1px;
  transition: border-color 0.5s, box-shadow 0.5s;
}
.panel.hot {
  border-color: #1a6a1a;
  box-shadow: 0 0 14px rgba(0,255,65,0.06), inset 0 0 20px rgba(0,255,65,0.03);
}
.panel.err { border-color: #5a0a0a; }

.ph {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 9px 13px 7px;
  border-bottom: 1px solid #0a2a0a;
}
.pname {
  font-size: 13px; font-weight: bold; letter-spacing: 3px;
  color: #00ff41; text-shadow: 0 0 8px #00ff41;
}
.prole { font-size: 10px; color: #1a5a1a; letter-spacing: 1px; margin-top: 1px; }
.pstat {
  font-size: 10px; letter-spacing: 1px;
  padding: 2px 8px; border: 1px solid;
}
.pstat.active { color:#00ff41; border-color:#1a6a1a; text-shadow:0 0 6px #00ff41; }
.pstat.idle   { color:#1a5a1a; border-color:#0a2a0a; }
.pstat.err    { color:#ff3333; border-color:#6a0a0a; }

.pg {
  padding: 8px 13px 6px;
  border-bottom: 1px solid #060f06;
}
.pg-lbl { font-size: 9px; color: #1a4a1a; letter-spacing: 1px; margin-bottom: 3px; }
.pg-obj {
  font-size: 11px; color: #2a8a2a;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 5px; min-height: 14px;
}
.pgbar { height: 2px; background: #060f06; border-radius: 1px; overflow: hidden; }
.pgfill {
  height: 100%; border-radius: 1px;
  background: linear-gradient(90deg, #002a00, #00ff41);
  box-shadow: 0 0 8px #00ff41;
  transition: width 1.5s ease;
}
.pg-sub { font-size: 9px; color: #1a4a1a; text-align: right; margin-top: 2px; }

/* Global activity feed */
#feed-wrap {
  flex: 1; min-height: 0;
  background: rgba(0,6,0,0.85);
  border: 1px solid #0a2a0a; border-radius: 1px;
  display: flex; flex-direction: column; overflow: hidden;
}
#feed-header {
  padding: 7px 13px; font-size: 10px;
  color: #1a5a1a; letter-spacing: 2px;
  border-bottom: 1px solid #0a2a0a; flex-shrink: 0;
}
#feed {
  flex: 1; overflow-y: auto; padding: 8px 13px;
  display: flex; flex-direction: column; gap: 2px;
}
#feed::-webkit-scrollbar { width: 2px; }
#feed::-webkit-scrollbar-thumb { background: #0a2a0a; }

.fl {
  display: flex; gap: 10px; font-size: 11px;
  line-height: 1.5; animation: fin 0.25s ease forwards; opacity: 0;
}
@keyframes fin { from{opacity:0;transform:translateX(-3px)} to{opacity:1;transform:none} }
.fl-ts  { color: #0d350d; flex-shrink: 0; font-size: 10px; padding-top: 1px; min-width: 56px; }
.fl-ico { flex-shrink: 0; width: 14px; }
.fl-txt { flex: 1; word-break: break-word; }

.fl.shell  .fl-txt { color: #3a8a3a; }
.fl.shell  .fl-ico { color: #3a8a3a; }
.fl.llm    .fl-txt { color: #00cc33; }
.fl.llm    .fl-ico { color: #00cc33; }
.fl.mem    .fl-txt { color: #1a7a1a; }
.fl.mem    .fl-ico { color: #1a7a1a; }
.fl.fs     .fl-txt { color: #00ff41; text-shadow: 0 0 4px #00ff41; }
.fl.fs     .fl-ico { color: #00ff41; }
.fl.synth  .fl-txt { color: #ffcc00; text-shadow: 0 0 6px #aa8800; }
.fl.synth  .fl-ico { color: #ffcc00; }
.fl.err    .fl-txt { color: #cc3333; }
.fl.err    .fl-ico { color: #cc3333; }
.fl.goal   .fl-txt { color: #00ff41; font-weight: bold; text-shadow: 0 0 6px #00ff41; }
.fl.dim    .fl-txt { color: #1a4a1a; }
.fl.dim    .fl-ico { color: #1a4a1a; }

/* Footer */
#footer {
  display: flex; justify-content: space-between;
  font-size: 10px; color: #1a4a1a; letter-spacing: 1px;
  border-top: 1px solid #0a2a0a; padding-top: 8px; flex-shrink: 0;
}
#footer b { color: #2a7a2a; font-weight: normal; }
</style>
</head>
<body>

<canvas id="rain"></canvas>
<div id="scanlines"></div>

<div id="ui">
  <div id="header">
    <div id="logo"><span class="pdot"></span>HOLLOW</div>
    <div id="header-right">
      <div>CYCLE <b id="h-cycle">—</b></div>
      <div>MODEL <b id="h-model">—</b></div>
      <div>ACTIVE <b id="h-active">—</b></div>
      <div>GPU <b id="h-gpu">—</b></div>
      <div id="h-time">—</div>
    </div>
  </div>

  <div id="panels"><!-- agent panels injected here --></div>

  <div id="feed-wrap">
    <div id="feed-header">SYSTEM ACTIVITY</div>
    <div id="feed"></div>
  </div>

  <div id="footer">
    <div>hollow agentOS v5.0.0</div>
    <div>tokens <b id="f-tok">—</b> &nbsp;·&nbsp; <b id="f-status">connecting…</b></div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API   = 'http://localhost:7777';
const TOKEN = localStorage.getItem('hollow-token') || prompt('API token (from config.json):') || '';
if (TOKEN) localStorage.setItem('hollow-token', TOKEN);

function h() { return { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }; }

async function api(path) {
  try {
    const r = await fetch(API + path, { headers: h() });
    return r.ok ? await r.json() : null;
  } catch(_) { return null; }
}

// ── Rain ──────────────────────────────────────────────────────────────────────
const cv  = document.getElementById('rain');
const ctx = cv.getContext('2d');
const CH  = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎ0123456789ABCDEFGHIJKLMNOP<>[]{}';
const FS  = 13;
let drops=[], speeds=[], bright=[], ncols=0;

function initRain() {
  cv.width = innerWidth; cv.height = innerHeight;
  ncols  = Math.floor(cv.width / FS);
  drops  = Array.from({length:ncols}, ()=> Math.random() * -cv.height);
  speeds = Array.from({length:ncols}, ()=> 0.3 + Math.random() * 1.0);
  bright = Array.from({length:ncols}, ()=> 0.4 + Math.random() * 0.6);
}

function rain() {
  ctx.fillStyle = 'rgba(0,0,0,0.055)';
  ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.font = `${FS}px 'Courier New'`;
  for (let i = 0; i < ncols; i++) {
    const ch = CH[Math.floor(Math.random()*CH.length)];
    const x  = i * FS, y = drops[i];
    // bright head
    ctx.fillStyle = `rgba(160,255,160,${bright[i]})`;
    ctx.fillText(ch, x, y);
    // dim trail char
    ctx.fillStyle = `rgba(0,160,40,${bright[i]*0.5})`;
    ctx.fillText(CH[Math.floor(Math.random()*CH.length)], x, y - FS);
    drops[i] += speeds[i] * FS * 0.45;
    if (drops[i] > cv.height && Math.random() > 0.975) {
      drops[i] = Math.random() * -180;
    }
  }
}

initRain();
addEventListener('resize', initRain);
setInterval(rain, 48);

// Pulse intensity
let intensity = 0.14;
cv.style.opacity = intensity;
function pulse(v) { intensity = Math.max(0.08, Math.min(0.28, intensity + v)); cv.style.opacity = intensity; }
setInterval(()=>pulse(-0.01), 2000);

// ── Agent panels ──────────────────────────────────────────────────────────────
const DAEMON_AGENTS = ['analyst','scout','builder'];
const panelsEl = document.getElementById('panels');
const panelMap = {};

function mkPanel(name) {
  if (panelMap[name]) return;
  const d = document.createElement('div');
  d.className = 'panel';
  d.id = `p-${name}`;
  d.innerHTML = `
    <div class="ph">
      <div><div class="pname">${name.toUpperCase()}</div><div class="prole" id="pr-${name}">worker</div></div>
      <div class="pstat idle" id="ps-${name}">IDLE</div>
    </div>
    <div class="pg">
      <div class="pg-lbl">OBJECTIVE</div>
      <div class="pg-obj" id="po-${name}">—</div>
      <div class="pgbar"><div class="pgfill" id="pb-${name}" style="width:0%"></div></div>
      <div class="pg-sub" id="pp-${name}"></div>
    </div>
  `;
  panelsEl.appendChild(d);
  panelMap[name] = d;
}

DAEMON_AGENTS.forEach(mkPanel);

function updatePanel(name, goal, progress, steps, hasErr) {
  const el = panelMap[name];
  if (!el) return;
  const active = !!goal;
  el.className = 'panel' + (active ? ' hot' : '') + (hasErr ? ' err' : '');

  const ps = document.getElementById(`ps-${name}`);
  ps.className = 'pstat ' + (active ? 'active' : hasErr ? 'err' : 'idle');
  ps.textContent = active ? 'ACTIVE' : hasErr ? 'ERROR' : 'IDLE';

  const obj = document.getElementById(`po-${name}`);
  obj.textContent = goal ? (goal.length > 95 ? goal.slice(0,92)+'…' : goal) : '—';

  const pct = Math.round((progress||0)*100);
  document.getElementById(`pb-${name}`).style.width = pct + '%';
  document.getElementById(`pp-${name}`).textContent = goal ? `${pct}%  ·  ${steps||0} steps` : '';

  if (active) pulse(0.03);
}

// ── Activity feed ─────────────────────────────────────────────────────────────
const feedEl  = document.getElementById('feed');
let   lastTs  = null;
let   feedLen = 0;

const ACTION_MAP = {
  shell_command: { cls:'shell', ico:'$', fmt: d => d.command ? d.command.slice(0,80) : 'shell' },
  ollama_chat:   { cls:'llm',   ico:'◈', fmt: d => d.prompt  ? d.prompt.slice(0,80)  : 'ollama call' },
  memory_set:    { cls:'mem',   ico:'●', fmt: d => `memory ← ${d.key||''}` },
  memory_get:    { cls:'mem',   ico:'○', fmt: d => `memory → ${d.key||''}` },
  fs_write:      { cls:'fs',    ico:'▲', fmt: d => `write   ${d.path||''}` },
  fs_read:       { cls:'dim',   ico:'▽', fmt: d => `read    ${d.path||''}` },
  goal_created:  { cls:'goal',  ico:'◎', fmt: d => `new goal: ${(d.objective||'').slice(0,70)}` },
  capability_deployed: { cls:'synth', ico:'⚡', fmt: d => `deployed: ${d.name||'capability'}` },
  error:         { cls:'err',   ico:'✗', fmt: d => d.message||'error' },
};

function addFeedLine(ts, action, details) {
  const map   = ACTION_MAP[action] || { cls:'dim', ico:'·', fmt: d => action };
  const time  = new Date(ts).toTimeString().slice(0,8);
  const text  = map.fmt(details||{});

  const div = document.createElement('div');
  div.className = `fl ${map.cls}`;
  div.innerHTML = `
    <span class="fl-ts">${time}</span>
    <span class="fl-ico">${map.ico}</span>
    <span class="fl-txt">${esc(text)}</span>
  `;
  feedEl.appendChild(div);
  feedLen++;

  // Cap at 200 lines
  while (feedLen > 200) { feedEl.firstChild.remove(); feedLen--; }
  feedEl.scrollTop = feedEl.scrollHeight;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Poll loop ─────────────────────────────────────────────────────────────────
let cycle = 0;

async function pollGoals() {
  for (const name of DAEMON_AGENTS) {
    const d = await api(`/goals/${name}`);
    if (!d) { updatePanel(name, null, 0, 0, false); continue; }
    const goals   = (d.goals||[]).filter(g=>g.status==='active');
    const best    = goals.sort((a,b)=>(b.metrics?.progress||0)-(a.metrics?.progress||0))[0];
    const hasErr  = false; // no per-agent error signal available
    updatePanel(name, best?.objective||null, best?.metrics?.progress||0, best?.metrics?.steps_completed||0, hasErr);
  }
}

async function pollActions() {
  const d = await api('/memory/actions?n=80');
  if (!d || !d.actions) return;

  const actions = d.actions;
  // Find new ones since last poll
  const newOnes = lastTs
    ? actions.filter(a => new Date(a.timestamp) > new Date(lastTs))
    : actions.slice(-20);

  if (newOnes.length) {
    lastTs = newOnes[newOnes.length-1].timestamp;
    for (const a of newOnes) {
      addFeedLine(a.timestamp, a.action, a.details||{});
    }
    pulse(0.05 * newOnes.length);
  }
}

async function pollState() {
  const d = await api('/state?fields=ollama,system');
  if (!d) return;

  const model = d.ollama?.running?.[0];
  document.getElementById('h-model').textContent =
    typeof model === 'string' ? model : (model?.name || '—');

  const gpu = d.system?.gpu;
  document.getElementById('h-gpu').textContent = gpu
    ? `${gpu.memory_used_mb}/${gpu.memory_total_mb}MB`
    : '—';
}

async function pollAgentCount() {
  const d = await api('/agents');
  if (!d) return;
  const active = (d.agents||[]).filter(a=>a.status==='active').length;
  document.getElementById('h-active').textContent = active;
}

function updateClock() {
  document.getElementById('h-time').textContent = new Date().toTimeString().slice(0,8);
}

async function tick() {
  cycle++;
  document.getElementById('h-cycle').textContent = cycle;
  document.getElementById('f-status').textContent = 'live';

  await Promise.all([pollGoals(), pollActions()]);
  if (cycle % 5 === 0) await Promise.all([pollState(), pollAgentCount()]);
  updateClock();
}

// Initial fast state load, then regular interval
pollState();
pollAgentCount();
tick();
setInterval(tick, 4000);
</script>
</body>
</html>
