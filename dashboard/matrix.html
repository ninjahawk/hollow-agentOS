<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hollow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #080808; }

canvas { position: fixed; inset: 0; display: block; }

#overlay {
  position: fixed; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  background: rgba(8,8,8,0.95);
  backdrop-filter: blur(30px);
}
#overlay.gone { display: none; }
#sheet {
  width: 300px; text-align: center;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  background: rgba(18,18,18,0.98);
  padding: 28px 24px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.9);
  font-family: 'JetBrains Mono', monospace;
}
#sheet h2 { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.8); letter-spacing: 2px; margin-bottom: 5px; }
#sheet p  { font-size: 10px; color: rgba(255,255,255,0.25); margin-bottom: 18px; line-height: 1.6; }
#ti {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 9px;
  color: rgba(255,255,255,0.8); font-family: inherit; font-size: 11px;
  padding: 10px 12px; outline: none; margin-bottom: 10px;
  transition: border-color 0.2s;
}
#ti:focus { border-color: rgba(48,209,88,0.4); }
#ti::placeholder { color: rgba(255,255,255,0.18); }
#tb {
  width: 100%; background: #30d158; border: none; border-radius: 9px;
  color: #000; font-family: inherit; font-size: 12px; font-weight: 400;
  padding: 10px; cursor: pointer; transition: opacity 0.15s;
}
#tb:hover { opacity: 0.82; }
</style>
</head>
<body>

<div id="overlay">
  <div id="sheet">
    <h2>HOLLOW</h2>
    <p>API token to connect.<br>Found in config.json</p>
    <input id="ti" type="password" placeholder="token" autocomplete="off"/>
    <button id="tb">Connect</button>
  </div>
</div>

<canvas id="c"></canvas>

<script>
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');

// ── Zone color palettes ────────────────────────────────────────────────────────
// Each agent has a base hue. Idle = dim, active = bright, flash = peak.
// analyst  = green   (classic Matrix)
// scout    = teal    (cooler, exploratory)
// builder  = amber-green (warmer, constructive)
const ZONE_COLOR = [
  { r:30,  g:200, b:60  },   // analyst  — green
  { r:20,  g:180, b:160 },   // scout    — teal
  { r:120, g:200, b:30  },   // builder  — amber-green
];

// ── Characters ────────────────────────────────────────────────────────────────
const KATAKANA = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
const NUMBERS  = '０１２３４５６７８９';
const ALL_CH   = KATAKANA + NUMBERS;

// ── State ─────────────────────────────────────────────────────────────────────
let W, H, FS, ncols;
const AGENTS = ['analyst', 'scout', 'builder'];
const GAP    = 2;   // gap columns between zones
const TRAIL  = 22;

// Per-zone signals (0-1)
const zAct    = [0, 0, 0];   // general activity level
const zFlash  = [0, 0, 0];   // deploy/write flash
const zOllama = [0, 0, 0];   // model thinking (slows + whitens head)
const zShell  = [0, 0, 0];   // shell command pulse
const zProg   = [0, 0, 0];   // goal progress 0-1

let cols = [];

function resize() {
  W = cv.width  = innerWidth;
  H = cv.height = innerHeight;
  FS    = 16;
  ncols = Math.floor(W / FS);
  initCols();
}

function initCols() {
  cols = [];
  const usable = ncols - GAP * 2;
  const zw     = Math.floor(usable / 3);

  for (let i = 0; i < ncols; i++) {
    const b1 = zw, b2 = zw+GAP, b3 = zw*2+GAP, b4 = zw*2+GAP*2;
    const zone = i < b1 ? 0 : i < b2 ? -1 : i < b3 ? 1 : i < b4 ? -1 : 2;
    const gap  = zone < 0;

    // Columns near zone boundary are slightly sparser
    const boundaryDist = Math.min(
      Math.abs(i - b1), Math.abs(i - b2),
      Math.abs(i - b3), Math.abs(i - b4)
    );
    const sparse = !gap && boundaryDist < 2;

    cols.push({
      x:      i * FS,
      drop:   Math.random() * -H * 1.2,
      speed:  1.2 + Math.random() * 1.4,
      zone,
      gap,
      sparse,
      trail:  [],
      mode:   'kata',   // 'kata' | 'num' — switches during model calls
      word:   null,     // { chars, y, alpha, color } — surfaces briefly
    });
  }
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, H);
  ctx.font = `${FS}px 'Noto Sans JP', 'Yu Gothic', 'MS Gothic', monospace`;

  for (let i = 0; i < cols.length; i++) {
    const col = cols[i];
    if (col.gap) continue;

    const z      = col.zone;
    const act    = zAct[z];
    const flash  = zFlash[z];
    const ollama = zOllama[z];
    const shell  = zShell[z];
    const C      = ZONE_COLOR[z];

    // Speed: slows during Ollama (thinking), speeds during activity
    const thinkSlow = ollama * 0.6;
    const spd = col.speed * Math.max(0.3, 0.8 + act * 1.4 - thinkSlow);
    col.drop += spd * FS * 0.55;
    if (col.drop > H && Math.random() > (col.sparse ? 0.96 : 0.972)) {
      col.drop = Math.random() * -H * 0.5;
      col.trail = [];
    }

    // Character set: switches to numbers during model calls
    const charset = ollama > 0.3 ? NUMBERS : KATAKANA;
    const headCh  = charset[Math.floor(Math.random() * charset.length)];

    col.trail.unshift({ y: Math.floor(col.drop), ch: headCh });
    if (col.trail.length > TRAIL) col.trail.length = TRAIL;

    // ── Color computation ──────────────────────────────────────────────────
    // Flash → white-shift entire column
    // Ollama → head goes near-white (hot)
    // Shell → brief brightness pulse
    // Idle → dim zone color

    const flashLift = flash * 180;
    const r = Math.min(255, C.r + act * 30 + flashLift + shell * 40);
    const g = Math.min(255, C.g + act * 30 + flashLift * 0.4 + shell * 30);
    const b = Math.min(255, C.b + act * 20 + flashLift + shell * 40);

    // Head brightness
    const headBase  = 0.5 + act * 0.3 + flash * 0.35;
    const headAlpha = ollama > 0 ? Math.min(1, headBase + ollama * 0.5) : headBase;

    // Draw trail oldest→newest
    for (let t = col.trail.length - 1; t >= 0; t--) {
      const { y, ch } = col.trail[t];
      const frac  = 1 - t / TRAIL;
      const alpha = t === 0
        ? Math.min(1, headAlpha)
        : frac * frac * (0.18 + act * 0.12 + flash * 0.25);

      if (alpha < 0.01) continue;

      // Head during ollama shifts toward pure white
      if (t === 0 && ollama > 0.2) {
        const w = ollama;
        ctx.fillStyle = `rgba(${Math.floor(r+(255-r)*w)},${Math.floor(g+(255-g)*w)},${Math.floor(b+(255-b)*w)},${alpha.toFixed(3)})`;
      } else {
        ctx.fillStyle = `rgba(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)},${alpha.toFixed(3)})`;
      }
      ctx.fillText(ch, col.x, y);
    }

    // ── Surfaced word ──────────────────────────────────────────────────────
    if (col.word) {
      const w = col.word;
      w.alpha -= 0.012;
      if (w.alpha <= 0) {
        col.word = null;
      } else {
        ctx.fillStyle = `rgba(${w.r},${w.g},${w.b},${Math.min(1,w.alpha).toFixed(3)})`;
        for (let ci = 0; ci < w.chars.length; ci++) {
          ctx.fillText(w.chars[ci], col.x, w.y + ci * FS);
        }
      }
    }
  }

  // Draw progress as a faint horizontal line near bottom of each zone
  drawProgressLines();
}

function drawProgressLines() {
  const usable = ncols - GAP * 2;
  const zw     = Math.floor(usable / 3);

  for (let z = 0; z < 3; z++) {
    const pct = zProg[z];
    if (pct < 0.01) continue;
    const C    = ZONE_COLOR[z];
    const xStart = z === 0 ? 0 : z === 1 ? (zw+GAP)*FS : (zw*2+GAP*2)*FS;
    const xEnd   = xStart + zw * FS * pct;
    const y      = H - 3;

    ctx.strokeStyle = `rgba(${C.r},${C.g},${C.b},0.35)`;
    ctx.lineWidth   = 1;
    ctx.shadowColor = `rgba(${C.r},${C.g},${C.b},0.6)`;
    ctx.shadowBlur  = 4;
    ctx.beginPath();
    ctx.moveTo(xStart, y);
    ctx.lineTo(xEnd,   y);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// ── Surface a word in a zone ──────────────────────────────────────────────────
function surfaceWord(z, text, bright) {
  const zoneCols = cols.filter(c => c.zone === z);
  if (!zoneCols.length) return;
  const mid = Math.floor(zoneCols.length / 2);
  const col = zoneCols[Math.max(0, mid - 2 + Math.floor(Math.random() * 4))];
  const C   = ZONE_COLOR[z];

  const wr = bright ? 255 : Math.min(255, C.r + 80);
  const wg = bright ? 255 : Math.min(255, C.g + 60);
  const wb = bright ? 255 : Math.min(255, C.b + 80);

  col.word = {
    chars: text.slice(0, 16).split(''),
    y:     H * 0.2 + Math.random() * H * 0.45,
    alpha: 0.9,
    r: wr, g: wg, b: wb,
  };
}

// ── Decay ─────────────────────────────────────────────────────────────────────
setInterval(() => {
  for (let z = 0; z < 3; z++) {
    zAct[z]    = Math.max(0, zAct[z]    - 0.04);
    zFlash[z]  = Math.max(0, zFlash[z]  - 0.05);
    zOllama[z] = Math.max(0, zOllama[z] - 0.03);
    zShell[z]  = Math.max(0, zShell[z]  - 0.08);
  }
}, 80);

function signal(z, type, text) {
  switch (type) {
    case 'shell':
      zAct[z]   = Math.min(1, zAct[z]   + 0.3);
      zShell[z] = Math.min(1, zShell[z] + 0.7);
      break;
    case 'ollama':
      zAct[z]    = Math.min(1, zAct[z]    + 0.2);
      zOllama[z] = Math.min(1, zOllama[z] + 0.9);
      break;
    case 'memory':
      zAct[z] = Math.min(1, zAct[z] + 0.15);
      break;
    case 'write':
      zAct[z]   = Math.min(1, zAct[z]   + 0.5);
      zFlash[z] = Math.min(1, zFlash[z] + 0.8);
      if (text) surfaceWord(z, text.split('/').pop(), false);
      break;
    case 'deploy':
      zAct[z]   = 1.0;
      zFlash[z] = 1.0;
      if (text) surfaceWord(z, text, true);
      break;
    case 'goal':
      zAct[z] = Math.min(1, zAct[z] + 0.4);
      break;
  }
}

// ── Auth ──────────────────────────────────────────────────────────────────────
const API = 'http://localhost:7777';
let TOKEN = localStorage.getItem('hollow-token') || '';

document.getElementById('tb').onclick = connect;
document.getElementById('ti').onkeydown = e => { if (e.key==='Enter') connect(); };

function connect() {
  const t = document.getElementById('ti').value.trim();
  if (!t) return;
  TOKEN = t;
  localStorage.setItem('hollow-token', TOKEN);
  document.getElementById('overlay').classList.add('gone');
  start();
}
if (TOKEN) document.getElementById('overlay').classList.add('gone');

async function api(path) {
  try {
    const r = await fetch(API + path, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    return r.ok ? r.json() : null;
  } catch(_) { return null; }
}

// ── Poll goals ────────────────────────────────────────────────────────────────
async function pollGoals() {
  for (let z = 0; z < 3; z++) {
    const d = await api(`/goals/${AGENTS[z]}`);
    if (!d) continue;
    const active = (d.goals||[]).filter(g => g.status==='active');
    const best   = active.sort((a,b) => (b.metrics?.progress||0)-(a.metrics?.progress||0))[0];
    zProg[z] = best ? (best.metrics?.progress||0) : 0;
    if (best) zAct[z] = Math.max(zAct[z], 0.1);
  }
}

// ── Poll actions ──────────────────────────────────────────────────────────────
let lastTs = null;

const ACTION_ZONE_HINT = {
  // If we can't tell which agent, distribute by round-robin weighted by activity
};

async function pollActions() {
  const d = await api('/memory/actions?n=60');
  if (!d?.actions) return;

  const newOnes = lastTs
    ? d.actions.filter(a => new Date(a.timestamp) > new Date(lastTs))
    : d.actions.slice(-10);
  if (!newOnes.length) return;
  lastTs = newOnes[newOnes.length-1].timestamp;

  for (const a of newOnes) {
    // Weight zone selection by current activity
    const weights = zAct.map(v => 0.15 + v);
    const total   = weights.reduce((s,v)=>s+v,0);
    let rand = Math.random()*total, z = 0;
    for (let i=0;i<3;i++) { rand -= weights[i]; if (rand<=0){z=i;break;} }

    switch (a.action) {
      case 'shell_command':
        signal(z, 'shell', a.details?.command); break;
      case 'ollama_chat':
        signal(z, 'ollama', null); break;
      case 'memory_set':
      case 'memory_get':
        signal(z, 'memory', null); break;
      case 'fs_write':
        signal(z, 'write', a.details?.path); break;
      case 'capability_deployed':
        signal(z, 'deploy', a.details?.name||'capability'); break;
      case 'goal_created':
        signal(z, 'goal', null); break;
    }
  }
}

// ── Main ──────────────────────────────────────────────────────────────────────
let tick = 0;
async function loop() {
  tick++;
  await Promise.all([pollGoals(), pollActions()]);
}

function start() {
  loop();
  setInterval(loop, 4000);
}

resize();
addEventListener('resize', resize);

document.fonts.load(`16px 'Noto Sans JP'`).finally(() => {
  requestAnimationFrame(function frame() { draw(); requestAnimationFrame(frame); });
});

if (TOKEN) start();
</script>
</body>
</html>
