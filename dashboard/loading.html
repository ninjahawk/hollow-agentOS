<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- No meta refresh — JS polling handles the redirect once API is ready -->
<title>Hollow — Starting</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #c8c8c8;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  h1 { color: #7fff7f; font-size: 20px; letter-spacing: 4px; }
  .msg { color: #444; font-size: 12px; letter-spacing: 1px; }
  .dots { display: inline-block; }
  @keyframes blink {
    0%, 66% { opacity: 1; }
    67%, 100% { opacity: 0; }
  }
  .dot { animation: blink 1.5s infinite; }
  .dot:nth-child(2) { animation-delay: 0.5s; }
  .dot:nth-child(3) { animation-delay: 1s; }
</style>
</head>
<body>
<h1>HOLLOW</h1>
<div class="msg">
  starting up<span class="dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
</div>
<div class="msg" style="color:#222;font-size:10px;margin-top:8px">first boot may take a few minutes</div>
<script>
  // Poll the API. Once it's responding, redirect to apps.html.
  async function tryConnect() {
    try {
      const r = await fetch('http://localhost:7777/health', {signal: AbortSignal.timeout(3000)});
      if (r.ok) { window.location.href = 'apps.html'; return; }
    } catch {}
    setTimeout(tryConnect, 3000);
  }
  setTimeout(tryConnect, 2000);
</script>
</body>
</html>
