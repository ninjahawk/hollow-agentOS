<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hollow — Apps</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #c8c8c8;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    border-bottom: 1px solid #1e1e1e;
    background: #0d0d0d;
  }
  header h1 { color: #7fff7f; font-size: 14px; letter-spacing: 2px; }
  header nav a {
    color: #555;
    text-decoration: none;
    font-size: 12px;
    padding: 2px 8px;
  }
  header nav a:hover { color: #7fff7f; }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #333; margin-left: auto;
  }
  #status-dot.online { background: #7fff7f; box-shadow: 0 0 6px #7fff7f; }
  #status-dot.offline { background: #ff4444; }

  /* ── Main layout ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── App list (left) ── */
  #app-list {
    width: 260px;
    border-right: 1px solid #1e1e1e;
    overflow-y: auto;
    padding: 8px 0;
    display: flex;
    flex-direction: column;
  }
  #app-list h2 {
    color: #555;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 8px 12px 4px;
    text-transform: uppercase;
  }
  .app-item {
    padding: 8px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s;
  }
  .app-item:hover { background: #111; }
  .app-item.active {
    background: #0e1a0e;
    border-left-color: #7fff7f;
  }
  .app-item .app-name { color: #e0e0e0; font-weight: bold; font-size: 12px; }
  .app-item .app-desc { color: #555; font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .app-item .app-meta { color: #3a3; font-size: 10px; margin-top: 2px; display: flex; gap: 8px; }
  .app-item .quality { color: #3a6a3a; }
  .app-item .installs { color: #4a8a4a; }

  /* ── Wrap new repo panel ── */
  #wrap-panel {
    padding: 8px 10px;
    border-top: 1px solid #1a1a1a;
    margin-top: auto;
    flex-shrink: 0;
  }
  #wrap-input {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    color: #e0e0e0;
    padding: 5px 8px;
    font-family: inherit;
    font-size: 11px;
    outline: none;
    border-radius: 2px;
    margin-bottom: 4px;
  }
  #wrap-input:focus { border-color: #7fff7f; }
  #wrap-input::placeholder { color: #333; }
  #wrap-btn {
    width: 100%;
    background: #0e1a0e;
    border: 1px solid #3a7a3a;
    color: #7fff7f;
    padding: 5px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 1px;
  }
  #wrap-btn:hover { background: #1a2e1a; }
  #wrap-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #wrap-status { font-size: 10px; color: #555; margin-top: 3px; min-height: 14px; }

  #no-apps {
    padding: 20px 12px;
    color: #333;
    font-size: 11px;
    line-height: 1.6;
  }

  /* ── App detail (right) ── */
  #app-detail {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  #app-detail.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2a2a2a;
    font-size: 14px;
    letter-spacing: 1px;
  }

  #app-header { margin-bottom: 20px; }
  #app-header h2 { color: #7fff7f; font-size: 18px; }
  #app-header p { color: #666; margin-top: 4px; font-size: 12px; }
  #app-header .meta { color: #333; font-size: 11px; margin-top: 8px; }

  /* ── Capability selector ── */
  #cap-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .cap-tab {
    padding: 4px 10px;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    cursor: pointer;
    color: #666;
    font-size: 11px;
    background: transparent;
  }
  .cap-tab:hover { border-color: #444; color: #aaa; }
  .cap-tab.active { border-color: #7fff7f; color: #7fff7f; background: #0e1a0e; }

  /* ── Form ── */
  #app-form { max-width: 560px; }
  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block;
    color: #aaa;
    font-size: 11px;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field-group label .required { color: #7fff7f; margin-left: 2px; }
  .field-group input[type="text"],
  .field-group input[type="number"],
  .field-group select {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    color: #e0e0e0;
    padding: 7px 10px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
    border-radius: 2px;
  }
  .field-group input:focus,
  .field-group select:focus { border-color: #7fff7f; }
  .field-group input[type="checkbox"] { width: auto; margin-right: 6px; }
  .field-group .hint { color: #333; font-size: 10px; margin-top: 3px; }

  #run-btn {
    background: #0e1a0e;
    border: 1px solid #7fff7f;
    color: #7fff7f;
    padding: 8px 20px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    border-radius: 2px;
    margin-top: 4px;
  }
  #run-btn:hover { background: #1a2e1a; }
  #run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Output ── */
  #output-section { margin-top: 24px; }
  #output-section h3 { color: #555; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  #output-box {
    background: #060606;
    border: 1px solid #1a1a1a;
    padding: 12px;
    font-size: 11px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
    color: #bbb;
    border-radius: 2px;
    min-height: 60px;
  }
  #output-box.error { color: #ff6666; }
  #output-box.running { color: #666; font-style: italic; }

  /* ── Generated command preview ── */
  #cmd-preview {
    margin-top: 10px;
    color: #2a4a2a;
    font-size: 11px;
    padding: 6px 10px;
    background: #050505;
    border: 1px solid #1a1a1a;
    border-radius: 2px;
  }
  #cmd-preview span { color: #3a7a3a; }
</style>
</head>
<body>

<header>
  <h1>HOLLOW</h1>
  <nav>
    <a href="index.html">System</a>
    <a href="apps.html" style="color:#7fff7f">Apps</a>
  </nav>
  <div id="status-dot"></div>
</header>

<main>
  <div id="app-list">
    <div style="display:flex;align-items:center;padding:8px 12px 0;gap:8px">
      <h2 style="margin:0;flex:1">Apps</h2>
      <button onclick="showTab('local')" id="tab-local" style="background:none;border:none;color:#7fff7f;font:inherit;font-size:10px;cursor:pointer;padding:2px 6px;border-bottom:1px solid #7fff7f">LOCAL</button>
      <button onclick="showTab('store')" id="tab-store" style="background:none;border:none;color:#555;font:inherit;font-size:10px;cursor:pointer;padding:2px 6px">STORE</button>
    </div>
    <div id="search-bar" style="padding:6px 10px">
      <input id="search-input" type="text" placeholder="search..." oninput="filterList()" onkeydown="if(event.key==='Enter' && currentTab==='local') discoverTools()" style="width:100%;background:#111;border:1px solid #1e1e1e;color:#aaa;padding:4px 8px;font:inherit;font-size:11px;outline:none;border-radius:2px">
    </div>
    <div id="app-entries" style="flex:1;overflow-y:auto">
      <div id="no-apps" style="padding:20px 12px;color:#333;font-size:11px;line-height:1.6">Loading...</div>
    </div>
    <div id="wrap-panel">
      <div style="color:#333;font-size:10px;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase">Wrap New Repo</div>
      <input id="wrap-input" type="text" placeholder="https://github.com/owner/repo" onkeydown="if(event.key==='Enter')wrapNewRepo()">
      <button id="wrap-btn" onclick="wrapNewRepo()">+ WRAP</button>
      <div id="wrap-status"></div>
    </div>
  </div>

  <div id="app-detail" class="empty">
    select an app
  </div>
</main>

<script>
const API = 'http://localhost:7777';
const STORE = 'http://localhost:7779';
const TOKEN = (() => {
  const m = document.querySelector('meta[name="api-token"]');
  return m ? m.content : 'ci-test-token-replace-in-production';
})();

let wrappers = [];
let activeWrapper = null;
let activeCap = null;
let currentTab = 'local';

function showTab(tab) {
  currentTab = tab;
  document.getElementById('tab-local').style.color = tab === 'local' ? '#7fff7f' : '#555';
  document.getElementById('tab-local').style.borderBottom = tab === 'local' ? '1px solid #7fff7f' : 'none';
  document.getElementById('tab-store').style.color = tab === 'store' ? '#7fff7f' : '#555';
  document.getElementById('tab-store').style.borderBottom = tab === 'store' ? '1px solid #7fff7f' : 'none';
  // Update placeholder to match tab context
  const search = document.getElementById('search-input');
  if (search) search.placeholder = tab === 'store' ? 'search store...' : 'filter local...';
  if (tab === 'local') loadLocalWrappers();
  else loadStoreWrappers();
}

// ── Status dot ───────────────────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch(`${API}/health`, {headers: {Authorization: `Bearer ${TOKEN}`}});
    document.getElementById('status-dot').className = r.ok ? 'online' : 'offline';
  } catch {
    document.getElementById('status-dot').className = 'offline';
  }
}

// ── Load from local agent API ─────────────────────────────────────────────────
async function loadLocalWrappers() {
  try {
    const r = await fetch(`${API}/wrappers`, {headers: {Authorization: `Bearer ${TOKEN}`}});
    if (!r.ok) { renderEmpty('API unavailable'); return; }
    const data = await r.json();
    wrappers = [];
    for (const w of (data.wrappers || [])) {
      // Fetch full wrapper
      try {
        const wr = await fetch(`${API}/wrappers/${w.repo_name}`, {headers: {Authorization: `Bearer ${TOKEN}`}});
        if (wr.ok) wrappers.push({repo_id: w.repo_name, wrapper: await wr.json()});
      } catch {}
    }
    renderList();
  } catch (e) { renderEmpty('Failed to load local apps'); }
}

// ── Load from community store ─────────────────────────────────────────────────
async function loadStoreWrappers() {
  const q = document.getElementById('search-input')?.value.trim();
  const url = q ? `${STORE}/wrappers?sort=quality&limit=50&q=${encodeURIComponent(q)}` : `${STORE}/wrappers?sort=quality&limit=50`;
  try {
    const r = await fetch(url);
    if (!r.ok) { renderEmpty('Store unavailable'); return; }
    const data = await r.json();
    wrappers = [];
    for (const w of (data.wrappers || [])) {
      try {
        const wr = await fetch(`${STORE}/wrappers/${w.repo_id}`);
        if (wr.ok) {
          const fullWrapper = await wr.json();
          fullWrapper.quality_score = w.quality_score;  // carry quality score through
          wrappers.push({repo_id: w.repo_id, wrapper: fullWrapper, quality_score: w.quality_score});
        }
      } catch {}
    }
    renderList();
  } catch (e) { renderEmpty('Store offline'); }
}

async function loadWrappers() {
  await checkStatus();
  if (currentTab === 'local') await loadLocalWrappers();
  else await loadStoreWrappers();
}

function renderEmpty(msg) {
  document.getElementById('app-entries').innerHTML =
    `<div style="padding:20px 12px;color:#333;font-size:11px;line-height:1.6">${msg}</div>`;
}

// ── Render left panel ────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('app-entries');
  if (!wrappers.length) {
    el.innerHTML = '<div id="no-apps">No apps installed yet.<br><br>' +
      'Use <span style="color:#3a3">wrap_repo</span> to wrap a GitHub repo.</div>';
    return;
  }
  el.innerHTML = wrappers.map((w, i) => {
    const cm = w.wrapper.capability_map;
    const score = w.wrapper.quality_score || w.quality_score || '';
    const installs = w.wrapper.install_count || 0;
    return `<div class="app-item" onclick="selectApp(${i})">
      <div class="app-name">${esc(cm.name || w.repo_id)}</div>
      <div class="app-desc">${esc((cm.description || '').substring(0, 60))}</div>
      <div class="app-meta">
        ${score !== '' ? `<span class="quality">★ ${score}</span>` : ''}
        <span class="installs">${installs} installs</span>
      </div>
    </div>`;
  }).join('');
}

// ── Select an app ─────────────────────────────────────────────────────────────
async function selectApp(idx) {
  document.querySelectorAll('.app-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  activeWrapper = wrappers[idx].wrapper;
  activeCap = activeWrapper.capability_map.capabilities[0];

  // Check if the tool binary is available
  const invoke = activeWrapper.capability_map?.invoke;
  let toolAvailable = true;
  if (invoke) {
    try {
      const r = await fetch(`${API}/tools/check?invoke=${encodeURIComponent(invoke)}`,
        {headers: {Authorization: `Bearer ${TOKEN}`}});
      if (r.ok) {
        const d = await r.json();
        toolAvailable = d.available;
      }
    } catch {}
  }
  activeWrapper._toolAvailable = toolAvailable;
  renderDetail();
}

// ── Render right panel ────────────────────────────────────────────────────────
function renderDetail() {
  const w = activeWrapper;
  const cm = w.capability_map;
  const iface = w.interface_spec;
  const detail = document.getElementById('app-detail');
  detail.className = '';

  // Cap tabs
  const tabs = cm.capabilities.map((c, i) =>
    `<button class="cap-tab${i===0?' active':''}" onclick="selectCap(${i})">${esc(c.id)}</button>`
  ).join('');

  detail.innerHTML = `
    <div id="app-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div>
          <h2>${esc(cm.name)}</h2>
          <p>${esc(cm.description)}</p>
          <div class="meta">
            invoke: <span style="color:#3a7a3a">${esc(cm.invoke)}</span> &nbsp;·&nbsp;
            commit: <span id="current-commit">${esc(w.source_commit || 'unknown')}</span> &nbsp;·&nbsp;
            <a href="${esc(w.repo_url)}" target="_blank" style="color:#555">${esc(w.repo_url)}</a>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${currentTab === 'store' ? `<button onclick="installFromStore()" style="background:#0e1a0e;border:1px solid #3a7a3a;color:#7fff7f;padding:4px 10px;font:inherit;font-size:10px;cursor:pointer;border-radius:2px" id="install-btn">↓ install</button>` : ''}
          <button onclick="showCustomize()" style="background:none;border:1px solid #2a2a2a;color:#555;padding:4px 10px;font:inherit;font-size:10px;cursor:pointer;border-radius:2px" id="customize-btn">✎ customize</button>
          <button onclick="checkWrapperVersion()" style="background:none;border:1px solid #2a2a2a;color:#555;padding:4px 10px;font:inherit;font-size:10px;cursor:pointer;border-radius:2px;white-space:nowrap" id="update-btn">↑ updates</button>
        </div>
      </div>
      <div id="update-status" style="font-size:10px;color:#555;margin-top:4px"></div>
      <div id="customize-panel" style="display:none;margin-top:8px;border-top:1px solid #1a1a1a;padding-top:8px">
        <div style="font-size:10px;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Customize interface</div>
        <input id="customize-input" type="text" placeholder="describe how you want to use this tool..." onkeydown="if(event.key==='Enter')applyCustomize()" style="width:100%;background:#111;border:1px solid #2a2a2a;color:#e0e0e0;padding:6px 8px;font:inherit;font-size:11px;outline:none;border-radius:2px;margin-bottom:4px">
        <button onclick="applyCustomize()" style="background:#0e1a0e;border:1px solid #3a7a3a;color:#7fff7f;padding:4px 12px;font:inherit;font-size:11px;cursor:pointer;border-radius:2px" id="apply-customize-btn">Apply with Claude</button>
        <span id="customize-status" style="font-size:10px;color:#555;margin-left:8px"></span>
      </div>
    </div>
    <div id="cap-tabs">${tabs}</div>
    ${!w._toolAvailable ? `<div style="background:#1a0e0e;border:1px solid #4a2a2a;padding:10px 14px;border-radius:2px;margin-bottom:16px;font-size:11px;color:#cc8888">
      <strong style="color:#ff9999">Tool not installed:</strong> <code style="color:#ffaaaa">${esc(cm.invoke)}</code> not found in container.<br>
      <span style="color:#664444;margin-top:4px;display:block">Install hint: ${esc(cm.install_hint || 'see repo README')}</span>
    </div>` : ''}
    <div id="app-form"></div>
    <div id="cmd-preview" style="display:none">$ <span id="cmd-text"></span></div>
    <div id="output-section" style="display:none">
      <h3>Output</h3>
      <div id="output-box"></div>
    </div>
  `;

  renderForm(cm.capabilities[0], iface);
}

// ── Select capability tab ─────────────────────────────────────────────────────
function selectCap(idx) {
  document.querySelectorAll('.cap-tab').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  activeCap = activeWrapper.capability_map.capabilities[idx];
  renderForm(activeCap, activeWrapper.interface_spec);
}

// ── Render form from interface_spec ──────────────────────────────────────────
function renderForm(cap, iface) {
  const formEl = document.getElementById('app-form');
  if (!formEl) return;

  // Match fields to this capability's params
  const capParamNames = new Set((cap.params || []).map(p => p.name));
  const fields = iface.fields.filter(f => capParamNames.has(f.id) || !capParamNames.size);

  const fieldHtml = fields.map(f => {
    const req = f.required ? '<span class="required">*</span>' : '';
    let input = '';
    if (f.type === 'checkbox') {
      input = `<label><input type="checkbox" id="field-${esc(f.id)}"> ${esc(f.label)}</label>`;
    } else if (f.type === 'select' && f.options && f.options.length) {
      const opts = f.options.map(o => `<option>${esc(o)}</option>`).join('');
      input = `<select id="field-${esc(f.id)}">${opts}</select>`;
    } else if (f.type === 'number') {
      input = `<input type="number" id="field-${esc(f.id)}" placeholder="${esc(f.placeholder || '')}">`;
    } else {
      input = `<input type="text" id="field-${esc(f.id)}" placeholder="${esc(f.placeholder || '')}" oninput="updatePreview()">`;
    }
    return `<div class="field-group">
      <label>${esc(f.label)}${req}</label>
      ${input}
    </div>`;
  }).join('');

  const toolOk = activeWrapper._toolAvailable !== false;
  formEl.innerHTML = `
    ${fieldHtml}
    <button id="run-btn" onclick="runCommand()" ${!toolOk ? 'disabled title="Tool not installed in container"' : ''}>▶  Run</button>
    ${!toolOk ? '<span style="margin-left:8px;color:#664444;font-size:10px">tool not available</span>' : ''}
  `;

  updatePreview();
}

// ── Build the shell command from template + current field values ──────────────
function buildCommand() {
  if (!activeCap) return '';
  let cmd = activeCap.shell_template || activeCap.id;
  const fields = activeWrapper.interface_spec.fields;
  for (const f of fields) {
    const el = document.getElementById(`field-${f.id}`);
    if (!el) continue;
    const val = f.type === 'checkbox' ? (el.checked ? f.id : '') : el.value.trim();
    cmd = cmd.replace(new RegExp(`\\{${f.id}\\}`, 'g'), val);
  }
  // Remove unfilled optional placeholders
  cmd = cmd.replace(/\{[^}]+\}/g, '').trim().replace(/\s+/g, ' ');
  return cmd;
}

function updatePreview() {
  const cmd = buildCommand();
  const preview = document.getElementById('cmd-preview');
  const cmdText = document.getElementById('cmd-text');
  if (preview && cmdText) {
    cmdText.textContent = cmd;
    preview.style.display = cmd ? '' : 'none';
  }
}

// ── Run the command via the agent API ─────────────────────────────────────────
async function runCommand() {
  const cmd = buildCommand();
  if (!cmd) return;

  const btn = document.getElementById('run-btn');
  const outputSection = document.getElementById('output-section');
  const outputBox = document.getElementById('output-box');
  btn.disabled = true;
  outputSection.style.display = '';
  outputBox.className = 'running';
  outputBox.textContent = 'running...';

  try {
    const r = await fetch(`${API}/shell/sandbox`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${TOKEN}`,
      },
      body: JSON.stringify({command: cmd, cwd: '/agentOS/workspace/sandbox', timeout: 30}),
    });
    const data = await r.json();
    if (data.blocked) {
      outputBox.className = 'error';
      outputBox.textContent = `Command not allowed: ${data.reason || 'blocked for safety'}`;
    } else if (data.timed_out) {
      outputBox.className = 'error';
      outputBox.textContent = 'Took too long (30s limit). Try a more specific command.';
    } else if (data.exit_code !== 0 && data.stderr?.includes('command not found')) {
      // Tool not installed — friendly error
      const invoke = activeWrapper?.capability_map?.invoke || 'this tool';
      outputBox.className = 'error';
      outputBox.textContent = `"${invoke}" isn't installed yet.\n\nInstall hint: ${activeWrapper?.capability_map?.install_hint || 'see the repo README'}`;
    } else {
      const out = (data.stdout || '') + (data.stderr ? `\n[stderr]\n${data.stderr}` : '');
      outputBox.className = data.exit_code === 0 ? '' : 'error';
      outputBox.textContent = out || '(no output — command ran successfully)';
    }
  } catch (e) {
    outputBox.className = 'error';
    outputBox.textContent = `Couldn't connect to agent: ${e.message}`;
  } finally {
    btn.disabled = false;
  }
}

// ── Natural language tool discovery ──────────────────────────────────────────
async function discoverTools() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  renderEmpty(`Finding tools for: "${q}"...`);
  try {
    const r = await fetch(`${API}/discover`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({query: q, limit: 10}),
    });
    const d = await r.json();
    if (!d.results?.length) {
      renderEmpty(`No tools found for "${q}" — try wrapping one from the STORE tab`);
      return;
    }
    // Replace wrappers list with discovery results then fetch full wrappers
    wrappers = [];
    for (const result of d.results) {
      try {
        const wr = await fetch(`${API}/wrappers/${result.repo_name}`, {headers: {Authorization: `Bearer ${TOKEN}`}});
        if (wr.ok) wrappers.push({repo_id: result.repo_name, wrapper: await wr.json()});
      } catch {}
    }
    renderList();
  } catch(e) {
    renderEmpty('Discovery failed: ' + e.message);
  }
}

// ── Customize interface with Claude ──────────────────────────────────────────
function showCustomize() {
  const panel = document.getElementById('customize-panel');
  if (!panel) return;
  panel.style.display = panel.style.display === 'none' ? '' : 'none';
  if (panel.style.display !== 'none') {
    document.getElementById('customize-input')?.focus();
  }
}

async function applyCustomize() {
  if (!activeWrapper) return;
  const pref = document.getElementById('customize-input')?.value.trim();
  if (!pref) return;
  const repoName = activeWrapper.capability_map?.invoke ||
                   Object.keys({...(window._wrapperRepoNames||{})}).find(k => window._wrapperRepoNames[k] === activeWrapper);

  // Get repo_name from the wrappers list
  const idx = wrappers.findIndex(w => w.wrapper === activeWrapper);
  const repo_name = wrappers[idx]?.repo_id;
  if (!repo_name) {
    document.getElementById('customize-status').textContent = 'unknown repo name';
    return;
  }

  const btn = document.getElementById('apply-customize-btn');
  const status = document.getElementById('customize-status');
  btn.disabled = true;
  status.style.color = '#555';
  status.textContent = 'asking Claude...';

  try {
    const r = await fetch(`${API}/wrappers/${repo_name}/customize`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({repo_name, preference: pref}),
    });
    const d = await r.json();
    if (d.ok && d.interface_spec) {
      // Update the active wrapper's interface in-memory and re-render form
      activeWrapper.interface_spec = d.interface_spec;
      activeWrapper._customized = true;
      status.style.color = '#7fff7f';
      status.textContent = '✓ customized — re-rendering';
      setTimeout(() => {
        renderForm(activeCap, activeWrapper.interface_spec);
        status.textContent = '✓ applied';
        document.getElementById('customize-panel').style.display = 'none';
      }, 500);
    } else {
      status.style.color = '#ff6666';
      status.textContent = d.detail || 'failed';
    }
  } catch (e) {
    status.style.color = '#ff6666';
    status.textContent = e.message;
  } finally {
    btn.disabled = false;
  }
}

// ── Install from store ────────────────────────────────────────────────────────
async function installFromStore() {
  if (!activeWrapper || currentTab !== 'store') return;
  const btn = document.getElementById('install-btn');
  if (!btn) return;
  const repoUrl = activeWrapper.repo_url;
  if (!repoUrl) return;

  btn.disabled = true;
  btn.textContent = 'installing...';

  // Trigger wrap_repo on the agent side (clones locally and saves wrapper)
  try {
    const r = await fetch(`${API}/wrap`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({url: repoUrl}),
    });
    const d = await r.json();
    if (d.ok) {
      btn.style.color = '#7fff7f';
      btn.textContent = '✓ installed';
      // Also increment store install count
      const repoId = wrappers.find(w => w.wrapper === activeWrapper)?.repo_id;
      if (repoId) {
        await fetch(`${STORE}/wrappers/${repoId}/install`, {method: 'POST'}).catch(() => {});
      }
      setTimeout(() => { btn.textContent = '✓ local'; btn.disabled = false; }, 2000);
    } else {
      btn.textContent = 'failed';
      btn.style.color = '#ff6666';
      setTimeout(() => { btn.textContent = '↓ install'; btn.style.color = '#7fff7f'; btn.disabled = false; }, 2000);
    }
  } catch (e) {
    btn.textContent = 'error';
    btn.disabled = false;
  }
}

// ── Wrap new repo ─────────────────────────────────────────────────────────────
async function wrapNewRepo() {
  const url = document.getElementById('wrap-input').value.trim();
  if (!url || !url.startsWith('http')) {
    document.getElementById('wrap-status').textContent = 'enter a github url';
    return;
  }
  const btn = document.getElementById('wrap-btn');
  const status = document.getElementById('wrap-status');
  btn.disabled = true;
  status.style.color = '#555';
  status.textContent = 'wrapping... (may take ~30s)';
  try {
    const r = await fetch(`${API}/wrap`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({url}),
    });
    const d = await r.json();
    if (d.ok) {
      status.style.color = '#7fff7f';
      status.textContent = `✓ ${d.repo_name} wrapped (${d.capability_count} caps)`;
      document.getElementById('wrap-input').value = '';
      setTimeout(() => { status.textContent = ''; loadWrappers(); }, 2000);
    } else {
      status.style.color = '#ff6666';
      status.textContent = `✗ ${(d.error || 'failed').substring(0, 50)}`;
    }
  } catch (e) {
    status.style.color = '#ff6666';
    status.textContent = `✗ ${e.message}`;
  } finally {
    btn.disabled = false;
  }
}

// ── Check wrapper for updates ─────────────────────────────────────────────────
async function checkWrapperVersion() {
  if (!activeWrapper) return;
  const btn = document.getElementById('update-btn');
  const status = document.getElementById('update-status');
  btn.disabled = true;
  btn.textContent = 'checking...';
  status.style.color = '#555';
  status.textContent = 'querying GitHub...';
  try {
    const r = await fetch(`${API}/version-check`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${TOKEN}`},
    });
    const d = await r.json();
    const repoName = activeWrapper.capability_map?.name?.toLowerCase() || '';
    const updated = (d.repos || []).find(x => x.name === repoName && x.status === 'updated');
    const current = (d.repos || []).find(x => x.name === repoName && x.status === 'current');
    if (updated) {
      status.style.color = '#7fff7f';
      status.textContent = `✓ updated: ${updated.from} → ${updated.to}`;
      document.getElementById('current-commit').textContent = updated.to;
      setTimeout(loadWrappers, 1500);
    } else if (current) {
      status.style.color = '#555';
      status.textContent = `✓ up to date (${current.commit})`;
    } else {
      status.style.color = '#555';
      status.textContent = `checked: ${d.checked || 0} wrappers, ${d.updated || 0} updated`;
    }
  } catch (e) {
    status.style.color = '#ff6666';
    status.textContent = `error: ${e.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = '↑ check updates';
  }
}

// ── Filter/search app list ────────────────────────────────────────────────────
let _searchTimer = null;
function filterList() {
  if (currentTab === 'local') {
    // Client-side filter for local apps
    const q = document.getElementById('search-input').value.toLowerCase();
    document.querySelectorAll('.app-item').forEach(el => {
      const name = el.querySelector('.app-name')?.textContent.toLowerCase() || '';
      const desc = el.querySelector('.app-desc')?.textContent.toLowerCase() || '';
      el.style.display = (!q || name.includes(q) || desc.includes(q)) ? '' : 'none';
    });
  } else {
    // Server-side search for store — debounced
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => loadStoreWrappers(), 400);
  }
}

// ── Utility ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadWrappers();
setInterval(loadWrappers, 15000);
</script>
