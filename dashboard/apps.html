<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hollow — Apps</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #c8c8c8;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    border-bottom: 1px solid #1e1e1e;
    background: #0d0d0d;
  }
  header h1 { color: #7fff7f; font-size: 14px; letter-spacing: 2px; }
  header nav a {
    color: #555;
    text-decoration: none;
    font-size: 12px;
    padding: 2px 8px;
  }
  header nav a:hover { color: #7fff7f; }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #333; margin-left: auto;
  }
  #status-dot.online { background: #7fff7f; box-shadow: 0 0 6px #7fff7f; }
  #status-dot.offline { background: #ff4444; }

  /* ── Main layout ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── App list (left) ── */
  #app-list {
    width: 260px;
    border-right: 1px solid #1e1e1e;
    overflow-y: auto;
    padding: 8px 0;
    display: flex;
    flex-direction: column;
  }
  #app-list h2 {
    color: #555;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 8px 12px 4px;
    text-transform: uppercase;
  }
  .app-item {
    padding: 8px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s;
  }
  .app-item:hover { background: #111; }
  .app-item.active {
    background: #0e1a0e;
    border-left-color: #7fff7f;
  }
  .app-item .app-name { color: #e0e0e0; font-weight: bold; font-size: 12px; }
  .app-item .app-desc { color: #555; font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .app-item .app-meta { color: #3a3; font-size: 10px; margin-top: 2px; display: flex; gap: 8px; }
  .app-item .quality { color: #3a6a3a; }
  .app-item .installs { color: #4a8a4a; }

  /* ── Wrap new repo panel ── */
  #wrap-panel {
    padding: 8px 10px;
    border-top: 1px solid #1a1a1a;
    margin-top: auto;
    flex-shrink: 0;
  }
  #wrap-input {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    color: #e0e0e0;
    padding: 5px 8px;
    font-family: inherit;
    font-size: 11px;
    outline: none;
    border-radius: 2px;
    margin-bottom: 4px;
  }
  #wrap-input:focus { border-color: #7fff7f; }
  #wrap-input::placeholder { color: #333; }
  #wrap-btn {
    width: 100%;
    background: #0e1a0e;
    border: 1px solid #3a7a3a;
    color: #7fff7f;
    padding: 5px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 1px;
  }
  #wrap-btn:hover { background: #1a2e1a; }
  #wrap-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #wrap-status { font-size: 10px; color: #555; margin-top: 3px; min-height: 14px; }

  #no-apps {
    padding: 20px 12px;
    color: #444;
    font-size: 11px;
    line-height: 1.8;
  }
  .store-badge {
    display: inline-block;
    font-size: 9px;
    color: #3a6a8a;
    border: 1px solid #1a3a5a;
    border-radius: 2px;
    padding: 1px 4px;
    letter-spacing: 0.5px;
    vertical-align: middle;
    margin-left: 4px;
  }

  /* ── App detail (right) ── */
  #app-detail {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px;
  }

  #app-detail.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #2a2a2a;
    font-size: 14px;
    letter-spacing: 1px;
  }

  #app-header { margin-bottom: 20px; }
  #app-header h2 { color: #7fff7f; font-size: 18px; }
  #app-header p { color: #666; margin-top: 4px; font-size: 12px; }
  #app-header .meta { color: #333; font-size: 11px; margin-top: 8px; }

  /* ── Capability selector ── */
  #cap-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .cap-tab {
    padding: 4px 10px;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    cursor: pointer;
    color: #666;
    font-size: 11px;
    background: transparent;
  }
  .cap-tab:hover { border-color: #444; color: #aaa; }
  .cap-tab.active { border-color: #7fff7f; color: #7fff7f; background: #0e1a0e; }

  /* ── Form ── */
  #app-form { max-width: 560px; }
  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block;
    color: #aaa;
    font-size: 11px;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field-group label .required { color: #7fff7f; margin-left: 2px; }
  .field-group input[type="text"],
  .field-group input[type="number"],
  .field-group select {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    color: #e0e0e0;
    padding: 7px 10px;
    font-family: inherit;
    font-size: 12px;
    outline: none;
    border-radius: 2px;
  }
  .field-group input:focus,
  .field-group select:focus { border-color: #7fff7f; }
  .field-group input[type="checkbox"] { width: auto; margin-right: 6px; }
  .field-group .hint { color: #333; font-size: 10px; margin-top: 3px; }

  #run-btn {
    background: #0e1a0e;
    border: 1px solid #7fff7f;
    color: #7fff7f;
    padding: 8px 20px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    border-radius: 2px;
    margin-top: 4px;
  }
  #run-btn:hover { background: #1a2e1a; }
  #run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Output ── */
  #output-section { margin-top: 24px; }
  #output-section h3 { color: #555; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  #output-box {
    background: #060606;
    border: 1px solid #1a1a1a;
    padding: 12px;
    font-size: 11px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
    color: #bbb;
    border-radius: 2px;
    min-height: 60px;
  }
  #output-box.error { color: #ff6666; }
  #output-box.running { color: #666; font-style: italic; }

  /* ── Generated command preview ── */
  #cmd-preview {
    margin-top: 10px;
    color: #2a4a2a;
    font-size: 11px;
    padding: 6px 10px;
    background: #050505;
    border: 1px solid #1a1a1a;
    border-radius: 2px;
  }
  #cmd-preview span { color: #3a7a3a; }
</style>
</head>
<body>

<header>
  <h1>HOLLOW</h1>
  <nav>
    <a href="index.html">System</a>
    <a href="apps.html" style="color:#7fff7f">Apps</a>
  </nav>
  <div id="status-dot"></div>
</header>

<div id="system-banner" style="display:none;padding:6px 16px;font-size:10px;border-bottom:1px solid #2a2a4a;letter-spacing:0.3px"></div>
<main>
  <div id="app-list">
    <div style="display:flex;align-items:center;padding:8px 12px 0;gap:8px">
      <h2 style="margin:0;flex:1">Apps</h2>
      <button onclick="showTab('local')" id="tab-local" style="background:none;border:none;color:#7fff7f;font:inherit;font-size:10px;cursor:pointer;padding:2px 6px;border-bottom:1px solid #7fff7f">LOCAL</button>
      <button onclick="showTab('store')" id="tab-store" style="background:none;border:none;color:#555;font:inherit;font-size:10px;cursor:pointer;padding:2px 6px">STORE</button>
    </div>
    <div id="search-bar" style="padding:6px 10px">
      <input id="search-input" type="text" placeholder="what do you want to do?" oninput="filterList()" onkeydown="if(event.key==='Enter') filterList()" style="width:100%;background:#111;border:1px solid #1e1e1e;color:#aaa;padding:4px 8px;font:inherit;font-size:11px;outline:none;border-radius:2px">
    </div>
    <div id="app-entries" style="flex:1;overflow-y:auto">
      <div id="no-apps" style="padding:20px 12px;color:#333;font-size:11px;line-height:1.6">Loading...</div>
    </div>
    <div id="wrap-panel">
      <div style="color:#333;font-size:10px;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase">Add from GitHub</div>
      <input id="wrap-input" type="text" placeholder="github.com/owner/tool" onkeydown="if(event.key==='Enter')wrapNewRepo()">
      <button id="wrap-btn" onclick="wrapNewRepo()">+ ADD</button>
      <div id="wrap-status"></div>
      <div style="margin-top:6px;display:flex;gap:4px">
        <button onclick="triggerRepair()" style="flex:1;background:none;border:1px solid #222;color:#333;padding:3px;font:inherit;font-size:9px;cursor:pointer;border-radius:2px;letter-spacing:0.5px" title="Improve quality scores for low-quality store wrappers">⚙ repair quality</button>
        <button onclick="triggerVersionCheck()" style="flex:1;background:none;border:1px solid #222;color:#333;padding:3px;font:inherit;font-size:9px;cursor:pointer;border-radius:2px;letter-spacing:0.5px" title="Check GitHub for wrapper updates">↑ check updates</button>
      </div>
      <div id="admin-status" style="font-size:9px;color:#333;margin-top:2px;min-height:12px"></div>
    </div>
  </div>

  <div id="app-detail" class="empty" style="flex-direction:column;gap:8px;font-size:12px;color:#222;text-align:center;letter-spacing:0">
    <div style="color:#2a4a2a;font-size:13px;letter-spacing:2px">HOLLOW</div>
    <div style="font-size:10px;letter-spacing:0.5px;max-width:280px;line-height:1.7">
      Type what you want to do in the search box.<br>
      Hollow finds the right tool and runs it for you.
    </div>
  </div>
</main>

<script src="http://localhost:7777/token.js" onerror="void 0"></script>
<script>
const API = 'http://localhost:7777';
const STORE = 'http://localhost:7779';
// TOKEN: prefer window.__HOLLOW_TOKEN (injected by /token.js at runtime),
// then fall back to meta tag, then to the dev default.
// The script tag below loads /token.js asynchronously; if it hasn't fired yet
// when the first fetch runs, the fallback keeps things working.
const TOKEN = window.__HOLLOW_TOKEN
  || (document.querySelector('meta[name="api-token"]')?.content)
  || 'ci-test-token-replace-in-production';

let wrappers = [];
let activeWrapper = null;
let activeCap = null;
let currentTab = 'local';

function showTab(tab) {
  currentTab = tab;
  document.getElementById('tab-local').style.color = tab === 'local' ? '#7fff7f' : '#555';
  document.getElementById('tab-local').style.borderBottom = tab === 'local' ? '1px solid #7fff7f' : 'none';
  document.getElementById('tab-store').style.color = tab === 'store' ? '#7fff7f' : '#555';
  document.getElementById('tab-store').style.borderBottom = tab === 'store' ? '1px solid #7fff7f' : 'none';
  // Update placeholder to match tab context
  const search = document.getElementById('search-input');
  if (search) {
    search.placeholder = tab === 'store' ? 'search store by name...' : 'what do you want to do?';
    search.value = '';
  }
  if (tab === 'local') loadLocalWrappers();
  else loadStoreWrappers();
}

// ── Status dot + system health ──────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch(`${API}/health`, {headers: {Authorization: `Bearer ${TOKEN}`}});
    document.getElementById('status-dot').className = r.ok ? 'online' : 'offline';
    if (r.ok) checkSystemStatus();
  } catch {
    document.getElementById('status-dot').className = 'offline';
  }
}

async function checkSystemStatus() {
  try {
    const r = await fetch(`${API}/system/status`, {headers: {Authorization: `Bearer ${TOKEN}`}});
    if (!r.ok) return;
    const d = await r.json();
    const checks = d.checks || {};

    // Show a subtle banner if Claude is not connected
    const banner = document.getElementById('system-banner');
    if (!banner) return;
    const msgs = [];
    if (!checks.claude?.ok && !checks.ollama?.ok) {
      msgs.push('No AI model available — wrapping and discovery require Claude or Ollama. Add ANTHROPIC_API_KEY to .env.');
    } else if (!checks.claude?.ok) {
      msgs.push('Claude not connected — using Ollama (lower quality). Add ANTHROPIC_API_KEY to .env for best results.');
    }
    if (!checks.store?.ok) {
      msgs.push('Community store offline — browsing store tools unavailable.');
    }
    if (msgs.length) {
      banner.textContent = msgs.join(' · ');
      banner.style.display = '';
      banner.style.background = !checks.claude?.ok && !checks.ollama?.ok ? '#1a0e0e' : '#0e0e0e';
      banner.style.borderColor = !checks.claude?.ok && !checks.ollama?.ok ? '#4a2a2a' : '#2a2a2a';
      banner.style.color = !checks.claude?.ok && !checks.ollama?.ok ? '#cc8888' : '#666';
    } else {
      banner.style.display = 'none';
    }
  } catch {}
}

// ── Load from local agent API ─────────────────────────────────────────────────
async function loadLocalWrappers() {
  try {
    const r = await fetch(`${API}/wrappers`, {headers: {Authorization: `Bearer ${TOKEN}`}});
    if (!r.ok) { renderEmpty('Hollow is starting up — refresh in a moment, or check that the agent container is running.'); return; }
    const data = await r.json();
    wrappers = [];
    for (const w of (data.wrappers || [])) {
      // Fetch full wrapper
      try {
        const wr = await fetch(`${API}/wrappers/${w.repo_name}`, {headers: {Authorization: `Bearer ${TOKEN}`}});
        if (wr.ok) wrappers.push({repo_id: w.repo_name, wrapper: await wr.json()});
      } catch {}
    }
    renderList();
  } catch (e) { renderEmpty('Could not reach the Hollow agent. Is the container running? Try: docker compose up -d'); }
}

let _storeOffset = 0;
const _STORE_PAGE = 50;

// ── Load from community store (lazy: list only, full wrapper fetched on select) ─
async function loadStoreWrappers(append = false) {
  const q = document.getElementById('search-input')?.value.trim();
  if (!append) { _storeOffset = 0; }
  const params = new URLSearchParams({sort:'quality', limit:_STORE_PAGE, offset:_storeOffset});
  if (q) params.set('q', q);
  const url = `${STORE}/wrappers?${params}`;
  try {
    const r = await fetch(url);
    if (!r.ok) { renderEmpty('Store unavailable'); return; }
    const data = await r.json();
    const stubs = (data.wrappers || []).map(w => ({
      repo_id: w.repo_id,
      quality_score: w.quality_score,
      _stub: true,
      _total: data.total,
      wrapper: {
        repo_url: w.repo_url || '',
        capability_map: {name: w.name, description: w.description || '', invoke: '', capabilities: []},
        interface_spec: {fields: []},
        install_count: w.install_count || 0,
        quality_score: w.quality_score,
      },
    }));
    if (append) wrappers.push(...stubs);
    else wrappers = stubs;
    _storeOffset += stubs.length;
    renderList(data.total);
  } catch (e) { renderEmpty('Store offline'); }
}

async function loadWrappers() {
  await checkStatus();
  if (currentTab === 'local') await loadLocalWrappers();
  else await loadStoreWrappers();
}

function renderEmpty(msg) {
  document.getElementById('app-entries').innerHTML =
    `<div style="padding:20px 12px;color:#333;font-size:11px;line-height:1.6">${msg}</div>`;
}

// ── Render left panel ────────────────────────────────────────────────────────
function renderList(total) {
  const el = document.getElementById('app-entries');
  if (!wrappers.length) {
    if (currentTab === 'local') {
      const suggestions = [
        'search files by content',
        'compare two files',
        'format JSON data',
        'view running processes',
        'analyze log files',
        'work with git history',
        'compress or archive files',
        'convert between file formats',
      ];
      el.innerHTML = `<div id="no-apps">
        <div style="color:#2a4a2a;font-size:9px;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase">Try asking:</div>
        <div style="display:flex;flex-direction:column;gap:3px">
          ${suggestions.map(q =>
            `<button onclick="clickSuggestion('${q}')" style="text-align:left;background:none;border:1px solid #1a1a1a;color:#3a5a3a;padding:5px 8px;font:inherit;font-size:10px;cursor:pointer;border-radius:2px" onmouseover="this.style.color='#7fff7f';this.style.borderColor='#2a4a2a'" onmouseout="this.style.color='#3a5a3a';this.style.borderColor='#1a1a1a'">${q}</button>`
          ).join('')}
        </div>
        <div style="margin-top:10px;color:#222;font-size:10px">or browse the <span style="color:#2a5a4a;cursor:pointer" onclick="showTab('store')">store ›</span></div>
      </div>`;
    } else {
      el.innerHTML = '<div id="no-apps">Store unavailable or no results.</div>';
    }
    return;
  }
  const hasMore = currentTab === 'store' && total != null && wrappers.length < total;
  el.innerHTML = wrappers.map((w, i) => {
    const cm = w.wrapper.capability_map;
    const score = w.wrapper.quality_score || w.quality_score || '';
    const installs = w.wrapper.install_count || 0;
    const fromStore = w._fromStore || false;
    return `<div class="app-item" onclick="selectApp(${i})">
      <div class="app-name">${esc(cm.name || w.repo_id)}${fromStore ? '<span class="store-badge">STORE</span>' : ''}</div>
      <div class="app-desc">${esc((cm.description || '').substring(0, 60))}</div>
      <div class="app-meta">
        ${score !== '' ? `<span class="quality">★ ${score}</span>` : ''}
        ${installs > 0 ? `<span class="installs">${installs} installs</span>` : ''}
        ${fromStore ? '<span style="color:#2a5a7a;font-size:9px">click to install</span>' : ''}
      </div>
    </div>`;
  }).join('') + (hasMore
    ? `<div style="padding:8px 12px"><button onclick="loadStoreWrappers(true)" style="width:100%;background:#111;border:1px solid #2a2a2a;color:#555;padding:5px;font:inherit;font-size:10px;cursor:pointer;border-radius:2px">load more (${total - wrappers.length} remaining)</button></div>`
    : '');
}

// ── Select an app ─────────────────────────────────────────────────────────────
async function selectApp(idx) {
  document.querySelectorAll('.app-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  const entry = wrappers[idx];
  _activeEntry = entry;

  // Lazy-load full wrapper if we only have a stub (store tab)
  if (entry._stub) {
    const detail = document.getElementById('app-detail');
    detail.className = '';
    detail.innerHTML = '<div style="padding:24px 32px;color:#333">Loading...</div>';
    try {
      const wr = await fetch(`${STORE}/wrappers/${entry.repo_id}`);
      if (wr.ok) {
        const full = await wr.json();
        full.quality_score = entry.quality_score;
        entry.wrapper = full;
        entry._stub = false;
      }
    } catch {}
  }

  activeWrapper = entry.wrapper;
  activeCap = activeWrapper.capability_map.capabilities?.[0] || null;

  // Check if the tool binary is available
  const invoke = activeWrapper.capability_map?.invoke;
  let toolAvailable = true;
  if (invoke) {
    try {
      const r = await fetch(`${API}/tools/check?invoke=${encodeURIComponent(invoke)}`,
        {headers: {Authorization: `Bearer ${TOKEN}`}});
      if (r.ok) {
        const d = await r.json();
        toolAvailable = d.available;
      }
    } catch {}
  }
  activeWrapper._toolAvailable = toolAvailable;
  renderDetail();
}

// ── Developer details toggle ──────────────────────────────────────────────────
function toggleDevDetails() {
  const d = document.getElementById('dev-details');
  const t = document.getElementById('dev-details-toggle');
  if (!d || !t) return;
  const open = d.style.display !== 'none';
  d.style.display = open ? 'none' : '';
  t.textContent = open ? '· details ▾' : '· details ▴';
}

// ── Render right panel ────────────────────────────────────────────────────────
let _activeEntry = null;
function renderDetail() {
  const entry = _activeEntry;
  const w = activeWrapper;
  const cm = w.capability_map;
  const iface = w.interface_spec;
  const detail = document.getElementById('app-detail');
  detail.className = '';

  // Cap tabs
  const caps = cm.capabilities || [];
  const tabs = caps.map((c, i) =>
    `<button class="cap-tab${i===0?' active':''}" onclick="selectCap(${i})">${esc(c.id)}</button>`
  ).join('');

  const isFromStore = entry._fromStore || currentTab === 'store';
  const showInstall = isFromStore;  // Show install for any store-originated item; hidden after installFromStore sets _fromStore=false

  detail.innerHTML = `
    <div id="app-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
        <div>
          <h2>${esc(cm.name)}${isFromStore ? ' <span style="font-size:11px;color:#2a5a7a;font-weight:normal">· store</span>' : ''}</h2>
          <p>${esc(cm.description)}</p>
          <div class="meta" style="margin-top:6px">
            ${w.repo_url ? `<a href="${esc(w.repo_url)}" target="_blank" style="color:#2a4a2a;font-size:10px">${esc(w.repo_url.replace('https://github.com/', ''))}</a>` : ''}
            <span id="dev-details-toggle" onclick="toggleDevDetails()" style="cursor:pointer;color:#2a2a2a;font-size:10px;margin-left:8px">· details ▾</span>
          </div>
          <div id="dev-details" style="display:none;margin-top:4px;font-size:10px;color:#2a2a2a">
            invoke: <span style="color:#2a5a2a">${esc(cm.invoke)}</span>
            &nbsp;·&nbsp; commit: <span id="current-commit">${esc(w.source_commit || 'unknown')}</span>
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${showInstall ? `<button onclick="installFromStore()" style="background:#0e1a0e;border:1px solid #3a7a3a;color:#7fff7f;padding:4px 10px;font:inherit;font-size:10px;cursor:pointer;border-radius:2px" id="install-btn">↓ install</button>` : ''}
          ${!isFromStore ? `<button onclick="showCustomize()" style="background:none;border:1px solid #2a2a2a;color:#555;padding:4px 10px;font:inherit;font-size:10px;cursor:pointer;border-radius:2px" id="customize-btn">✎ customize</button>` : ''}
          ${!isFromStore ? `<button onclick="checkWrapperVersion()" style="background:none;border:1px solid #2a2a2a;color:#555;padding:4px 10px;font:inherit;font-size:10px;cursor:pointer;border-radius:2px;white-space:nowrap" id="update-btn">↑ updates</button>` : ''}

      <div id="customize-panel" style="display:none;margin-top:8px;border-top:1px solid #1a1a1a;padding-top:8px">
        <div style="font-size:10px;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Make it yours</div>
        <input id="customize-input" type="text" placeholder="e.g. 'just show me a search box and a file path'" onkeydown="if(event.key==='Enter')applyCustomize()" style="width:100%;background:#111;border:1px solid #2a2a2a;color:#e0e0e0;padding:6px 8px;font:inherit;font-size:11px;outline:none;border-radius:2px;margin-bottom:4px">
        <button onclick="applyCustomize()" style="background:#0e1a0e;border:1px solid #3a7a3a;color:#7fff7f;padding:4px 12px;font:inherit;font-size:11px;cursor:pointer;border-radius:2px" id="apply-customize-btn">Apply</button>
        <span id="customize-status" style="font-size:10px;color:#555;margin-left:8px"></span>
      </div>
    </div>
    <div id="cap-tabs">${tabs}</div>
    ${!w._toolAvailable ? `<div style="background:#1a0e0e;border:1px solid #4a2a2a;padding:10px 14px;border-radius:2px;margin-bottom:16px;font-size:11px;color:#cc8888">
      <strong style="color:#ff9999">Not installed:</strong> <code style="color:#ffaaaa">${esc(cm.invoke)}</code> not found.<br>
      <span style="color:#664444;margin-top:4px;display:block">${esc(cm.install_hint || 'Install manually — see repo README')}</span>
      ${cm.install_hint ? `<button onclick="installTool()" id="tool-install-btn" style="margin-top:6px;background:#1a0e0e;border:1px solid #7a4444;color:#ff9999;padding:4px 12px;font:inherit;font-size:10px;cursor:pointer;border-radius:2px">⬇ Install automatically</button>
      <span id="tool-install-status" style="font-size:10px;color:#555;margin-left:6px"></span>` : ''}
    </div>` : ''}
    <div id="app-form"></div>
    <div id="cmd-preview" style="display:none">$ <span id="cmd-text"></span></div>
    <div id="output-section" style="display:none">
      <h3>Output</h3>
      <div id="output-box"></div>
    </div>
  `;

  if (caps.length > 0) {
    renderForm(caps[0], iface);
  } else if (showInstall) {
    // Store item not yet installed — show install prompt instead of empty form
    document.getElementById('app-form').innerHTML =
      `<div style="color:#2a5a7a;font-size:11px;line-height:1.7;padding:8px 0">
        This tool is available in the community store.<br>
        Click <strong style="color:#7fff7f">↓ install</strong> above to add it to your Hollow.
      </div>`;
  } else {
    renderForm(null, iface);
  }
}

// ── Select capability tab ─────────────────────────────────────────────────────
function selectCap(idx) {
  document.querySelectorAll('.cap-tab').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  activeCap = activeWrapper.capability_map.capabilities[idx];
  renderForm(activeCap, activeWrapper.interface_spec);
}

// ── Render form from interface_spec ──────────────────────────────────────────
function renderForm(cap, iface) {
  const formEl = document.getElementById('app-form');
  if (!formEl) return;
  if (!cap) {
    formEl.innerHTML = '<div style="color:#333;font-size:11px">No capabilities defined for this app.</div>';
    return;
  }

  // Match fields to this capability's params
  const capParamNames = new Set((cap.params || []).map(p => p.name));
  const fields = (iface?.fields || []).filter(f => capParamNames.has(f.id) || !capParamNames.size);

  const fieldHtml = fields.map(f => {
    const req = f.required ? '<span class="required">*</span>' : '';
    let input = '';
    if (f.type === 'checkbox') {
      input = `<label><input type="checkbox" id="field-${esc(f.id)}"> ${esc(f.label)}</label>`;
    } else if (f.type === 'select' && f.options && f.options.length) {
      const opts = f.options.map(o => `<option>${esc(o)}</option>`).join('');
      input = `<select id="field-${esc(f.id)}">${opts}</select>`;
    } else if (f.type === 'number') {
      input = `<input type="number" id="field-${esc(f.id)}" placeholder="${esc(f.placeholder || '')}">`;
    } else {
      input = `<input type="text" id="field-${esc(f.id)}" placeholder="${esc(f.placeholder || '')}" oninput="updatePreview()">`;
    }
    return `<div class="field-group">
      <label>${esc(f.label)}${req}</label>
      ${input}
    </div>`;
  }).join('');

  const toolOk = activeWrapper._toolAvailable !== false;
  formEl.innerHTML = `
    ${fieldHtml}
    <button id="run-btn" onclick="runCommand()" ${!toolOk ? 'disabled title="Tool not installed in container"' : ''}>▶  Run</button>
    ${!toolOk ? '<span style="margin-left:8px;color:#664444;font-size:10px">tool not available</span>' : ''}
  `;

  updatePreview();
}

// ── Build the shell command from template + current field values ──────────────
function buildCommand() {
  if (!activeCap) return '';
  let cmd = activeCap.shell_template || activeCap.id;
  const fields = activeWrapper.interface_spec.fields;
  for (const f of fields) {
    const el = document.getElementById(`field-${f.id}`);
    if (!el) continue;
    const val = f.type === 'checkbox' ? (el.checked ? f.id : '') : el.value.trim();
    cmd = cmd.replace(new RegExp(`\\{${f.id}\\}`, 'g'), val);
  }
  // Remove unfilled optional placeholders
  cmd = cmd.replace(/\{[^}]+\}/g, '').trim().replace(/\s+/g, ' ');
  return cmd;
}

function updatePreview() {
  const cmd = buildCommand();
  const preview = document.getElementById('cmd-preview');
  const cmdText = document.getElementById('cmd-text');
  if (preview && cmdText) {
    cmdText.textContent = cmd;
    preview.style.display = cmd ? '' : 'none';
  }
}

// ── Run the command via the agent API ─────────────────────────────────────────
async function runCommand() {
  const cmd = buildCommand();
  if (!cmd) return;

  const btn = document.getElementById('run-btn');
  const outputSection = document.getElementById('output-section');
  const outputBox = document.getElementById('output-box');
  btn.disabled = true;
  outputSection.style.display = '';
  outputBox.className = 'running';
  outputBox.textContent = 'running...';

  try {
    const r = await fetch(`${API}/shell/sandbox`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${TOKEN}`,
      },
      body: JSON.stringify({command: cmd, cwd: '/agentOS/workspace/sandbox', timeout: 30}),
    });
    const data = await r.json();
    if (data.blocked) {
      outputBox.className = 'error';
      outputBox.textContent = `That command isn't allowed for safety reasons.`;
    } else if (data.timed_out) {
      outputBox.className = 'error';
      outputBox.textContent = 'This took too long (30 second limit). Try with fewer files, or a smaller scope.';
    } else if (data.exit_code !== 0 && (data.stderr?.includes('command not found') || data.stderr?.includes('not found'))) {
      const invoke = activeWrapper?.capability_map?.invoke || 'this tool';
      const hint = activeWrapper?.capability_map?.install_hint || '';
      outputBox.className = 'error';
      outputBox.textContent = `"${invoke}" isn't installed yet.${hint ? '\n\nTo install: click the "⬇ Install automatically" button above.' : '\n\nSee the tool\'s documentation to install it.'}`;
    } else if (data.exit_code !== 0 && data.stderr?.includes('Permission denied')) {
      outputBox.className = 'error';
      outputBox.textContent = `Permission denied — this operation isn't allowed in the sandbox.`;
    } else if (data.exit_code !== 0 && data.stderr?.includes('No such file or directory')) {
      outputBox.className = 'error';
      outputBox.textContent = `File or directory not found. Check that the path you entered is correct.`;
    } else {
      const out = (data.stdout || '') + (data.stderr && data.exit_code !== 0 ? `\n[error output]\n${data.stderr}` : (data.stderr ? `\n${data.stderr}` : ''));
      outputBox.className = data.exit_code === 0 ? '' : 'error';
      outputBox.textContent = out || '(command ran successfully — no output)';
    }
  } catch (e) {
    outputBox.className = 'error';
    outputBox.textContent = `Couldn't connect to agent: ${e.message}`;
  } finally {
    btn.disabled = false;
  }
}

// ── Auto-install tool ────────────────────────────────────────────────────────
async function installTool() {
  if (!activeWrapper) return;
  const cm = activeWrapper.capability_map || {};
  const invoke = cm.invoke;
  const hint = cm.install_hint || '';
  if (!invoke || !hint) return;

  const btn = document.getElementById('tool-install-btn');
  const status = document.getElementById('tool-install-status');
  btn.disabled = true;
  btn.textContent = 'installing...';
  status.style.color = '#555';
  status.textContent = 'this may take a minute';

  try {
    const r = await fetch(`${API}/tools/install`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({invoke, install_hint: hint, timeout: 120}),
    });
    const d = await r.json();
    if (d.ok && d.available) {
      status.style.color = '#7fff7f';
      status.textContent = `✓ ${d.message}`;
      activeWrapper._toolAvailable = true;
      // Re-enable run button
      const runBtn = document.getElementById('run-btn');
      if (runBtn) { runBtn.disabled = false; runBtn.title = ''; }
      btn.textContent = '✓ installed';
    } else {
      status.style.color = '#ff9999';
      status.textContent = d.message?.substring(0, 60) || 'failed';
      btn.textContent = '⬇ retry';
      btn.disabled = false;
    }
  } catch (e) {
    status.style.color = '#ff9999';
    status.textContent = e.message;
    btn.disabled = false;
    btn.textContent = '⬇ Install automatically';
  }
}

// ── Natural language tool discovery ──────────────────────────────────────────
async function discoverTools() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  renderEmpty(`Finding tools for: "${q}"...`);
  try {
    const r = await fetch(`${API}/discover`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({query: q, limit: 8, include_store: true}),
    });
    const d = await r.json();
    if (!d.results?.length) {
      renderEmpty(`Nothing found for "${q}" — try the STORE tab to browse all 100+ tools`);
      return;
    }

    wrappers = [];
    for (const result of d.results) {
      if (result.installed !== false) {
        // Already installed locally — fetch full wrapper
        try {
          const wr = await fetch(`${API}/wrappers/${result.repo_name}`, {headers: {Authorization: `Bearer ${TOKEN}`}});
          if (wr.ok) wrappers.push({repo_id: result.repo_name, wrapper: await wr.json(), _fromStore: false});
        } catch {}
      } else {
        // Not installed — use stub from store so user can install with one click
        wrappers.push({
          repo_id: result.repo_id || result.repo_name,
          _stub: true,
          _fromStore: true,
          quality_score: result.quality_score || 0,
          wrapper: {
            repo_url: '',
            capability_map: {name: result.name, description: result.description, invoke: result.invoke || result.name, capabilities: []},
            interface_spec: {fields: []},
            install_count: 0,
          },
        });
      }
    }
    renderList();
  } catch(e) {
    // If the API is down, fall back to searching the store directly from the browser
    try {
      const sq = encodeURIComponent(q);
      const sr = await fetch(`${STORE}/wrappers?q=${sq}&limit=8&sort=quality`);
      if (sr.ok) {
        const sd = await sr.json();
        if (sd.wrappers?.length) {
          wrappers = sd.wrappers.map(w => ({
            repo_id: w.repo_id,
            _stub: true,
            _fromStore: true,
            quality_score: w.quality_score || 0,
            wrapper: {
              repo_url: w.repo_url || '',
              capability_map: {name: w.name, description: w.description || '', invoke: w.name, capabilities: []},
              interface_spec: {fields: []},
              install_count: w.install_count || 0,
            },
          }));
          renderList();
          return;
        }
      }
    } catch {}
    renderEmpty('Search unavailable — is Hollow running? Try refreshing.');
  }
}

// ── Customize interface with Claude ──────────────────────────────────────────
function showCustomize() {
  const panel = document.getElementById('customize-panel');
  if (!panel) return;
  panel.style.display = panel.style.display === 'none' ? '' : 'none';
  if (panel.style.display !== 'none') {
    document.getElementById('customize-input')?.focus();
  }
}

async function applyCustomize() {
  if (!activeWrapper) return;
  const pref = document.getElementById('customize-input')?.value.trim();
  if (!pref) return;
  const repoName = activeWrapper.capability_map?.invoke ||
                   Object.keys({...(window._wrapperRepoNames||{})}).find(k => window._wrapperRepoNames[k] === activeWrapper);

  // Get repo_name from the wrappers list
  const idx = wrappers.findIndex(w => w.wrapper === activeWrapper);
  const repo_name = wrappers[idx]?.repo_id;
  if (!repo_name) {
    document.getElementById('customize-status').textContent = 'unknown repo name';
    return;
  }

  const btn = document.getElementById('apply-customize-btn');
  const status = document.getElementById('customize-status');
  btn.disabled = true;
  status.style.color = '#555';
  status.textContent = 'asking Claude...';

  try {
    const r = await fetch(`${API}/wrappers/${repo_name}/customize`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({repo_name, preference: pref}),
    });
    const d = await r.json();
    if (d.ok && d.interface_spec) {
      // Update the active wrapper's interface in-memory and re-render form
      activeWrapper.interface_spec = d.interface_spec;
      activeWrapper._customized = true;
      status.style.color = '#7fff7f';
      status.textContent = '✓ customized — re-rendering';
      setTimeout(() => {
        renderForm(activeCap, activeWrapper.interface_spec);
        status.textContent = '✓ applied';
        document.getElementById('customize-panel').style.display = 'none';
      }, 500);
    } else {
      status.style.color = '#ff6666';
      status.textContent = d.detail || 'failed';
    }
  } catch (e) {
    status.style.color = '#ff6666';
    status.textContent = e.message;
  } finally {
    btn.disabled = false;
  }
}

// ── Install from store ────────────────────────────────────────────────────────
async function installFromStore() {
  if (!activeWrapper) return;
  const btn = document.getElementById('install-btn');
  if (!btn) return;

  // Get repo URL — try activeWrapper first, then fetch full wrapper from store
  let repoUrl = activeWrapper.repo_url;
  const entry = _activeEntry;
  if (!repoUrl && entry?.repo_id) {
    try {
      const wr = await fetch(`${STORE}/wrappers/${entry.repo_id}`);
      if (wr.ok) {
        const full = await wr.json();
        repoUrl = full.repo_url;
        // Promote stub to full wrapper
        entry.wrapper = full;
        entry._stub = false;
        activeWrapper = full;
      }
    } catch {}
  }
  if (!repoUrl) {
    btn.textContent = 'no url';
    setTimeout(() => { btn.textContent = '↓ install'; btn.disabled = false; }, 2000);
    return;
  }

  btn.disabled = true;
  btn.textContent = 'installing...';

  try {
    const r = await fetch(`${API}/wrap`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({url: repoUrl}),
      signal: AbortSignal.timeout(90000),
    });
    let d = {};
    try { d = await r.json(); } catch {}
    if (d.ok) {
      btn.style.color = '#7fff7f';
      btn.textContent = '✓ installed';
      // Increment store install count
      if (entry?.repo_id) {
        await fetch(`${STORE}/wrappers/${entry.repo_id}/install`, {method: 'POST'}).catch(() => {});
      }
      // Mark as local, reload after brief pause
      entry._fromStore = false;
      entry._stub = false;
      // Auto-install the binary if it's not available (Phase 5: zero friction)
      const invoke = activeWrapper.capability_map?.invoke;
      const hint = activeWrapper.capability_map?.install_hint || '';
      if (invoke && hint) {
        btn.textContent = 'installing binary...';
        try {
          const check = await fetch(`${API}/tools/check?invoke=${encodeURIComponent(invoke)}`,
            {headers: {Authorization: `Bearer ${TOKEN}`}});
          const checkData = check.ok ? await check.json() : {};
          if (!checkData.available) {
            const ir = await fetch(`${API}/tools/install`, {
              method: 'POST',
              headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
              body: JSON.stringify({invoke, install_hint: hint, timeout: 120}),
            });
            const id = await ir.json();
            if (id.ok && id.available) {
              activeWrapper._toolAvailable = true;
            }
          } else {
            activeWrapper._toolAvailable = true;
          }
        } catch {}
      }
      setTimeout(() => {
        btn.textContent = '✓ local';
        btn.disabled = false;
        if (currentTab === 'local') loadLocalWrappers();
        // Re-render detail to reflect installed state
        if (activeWrapper) { entry._fromStore = false; renderDetail(); }
      }, 500);
    } else if (!r.ok && r.status === 401) {
      btn.style.color = '#ff9999';
      btn.textContent = 'auth error';
      setTimeout(() => { btn.textContent = '↓ install'; btn.style.color = '#7fff7f'; btn.disabled = false; }, 3000);
    } else {
      const errMsg = d.error || d.detail || 'install failed';
      btn.textContent = 'failed';
      btn.style.color = '#ff6666';
      btn.title = errMsg;
      setTimeout(() => { btn.textContent = '↓ install'; btn.style.color = '#7fff7f'; btn.disabled = false; btn.title = ''; }, 4000);
    }
  } catch (e) {
    btn.textContent = e.name === 'AbortError' ? 'timed out' : 'network error';
    btn.style.color = '#ff9999';
    setTimeout(() => { btn.textContent = '↓ install'; btn.style.color = '#7fff7f'; btn.disabled = false; }, 3000);
  }
}

// ── Wrap new repo ─────────────────────────────────────────────────────────────
async function wrapNewRepo() {
  let url = document.getElementById('wrap-input').value.trim();
  if (!url) { document.getElementById('wrap-status').textContent = 'enter a repo url'; return; }
  // Accept bare github.com/owner/repo or owner/repo formats
  if (!url.startsWith('http')) {
    if (url.startsWith('github.com/')) url = 'https://' + url;
    else if (/^[\w.-]+\/[\w.-]+$/.test(url)) url = 'https://github.com/' + url;
    else { document.getElementById('wrap-status').textContent = 'enter a GitHub URL or owner/repo'; return; }
  }
  const btn = document.getElementById('wrap-btn');
  const status = document.getElementById('wrap-status');
  btn.disabled = true;
  status.style.color = '#555';
  status.textContent = 'cloning repo...';
  // Progress messages — wrapping takes 20-60s so show activity
  const _wrapMessages = [
    'cloning repo...',
    'reading README...',
    'analyzing capabilities...',
    'generating interface...',
    'saving to store...',
    'almost done...',
  ];
  let _wrapMsgIdx = 0;
  const _wrapTimer = setInterval(() => {
    _wrapMsgIdx = Math.min(_wrapMsgIdx + 1, _wrapMessages.length - 1);
    if (btn.disabled) status.textContent = _wrapMessages[_wrapMsgIdx];
  }, 8000);
  try {
    const r = await fetch(`${API}/wrap`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},
      body: JSON.stringify({url}),
      signal: AbortSignal.timeout(90000),
    });
    let d = {};
    try { d = await r.json(); } catch {}
    clearInterval(_wrapTimer);
    if (d.ok) {
      status.style.color = '#7fff7f';
      status.textContent = `✓ ${d.repo_name} wrapped (${d.capability_count} caps)`;
      document.getElementById('wrap-input').value = '';
      setTimeout(() => { status.textContent = ''; loadWrappers(); }, 2000);
    } else {
      status.style.color = '#ff6666';
      status.textContent = `✗ ${(d.error || 'failed').substring(0, 80)}`;
    }
  } catch (e) {
    clearInterval(_wrapTimer);
    status.style.color = '#ff6666';
    status.textContent = `✗ ${e.message}`;
  } finally {
    btn.disabled = false;
  }
}

// ── Check wrapper for updates ─────────────────────────────────────────────────
async function checkWrapperVersion() {
  if (!activeWrapper) return;
  const btn = document.getElementById('update-btn');
  const status = document.getElementById('update-status');
  btn.disabled = true;
  btn.textContent = 'checking...';
  status.style.color = '#555';
  status.textContent = 'querying GitHub...';
  try {
    const r = await fetch(`${API}/version-check`, {
      method: 'POST',
      headers: {'Authorization': `Bearer ${TOKEN}`},
    });
    const d = await r.json();
    // Response is {ok, installed: {checked, updated, repos, ...}, store: {...}}
    const installed = d.installed || d;  // backward-compat
    const repos = installed.repos || d.repos || [];
    const repoName = activeWrapper.capability_map?.name?.toLowerCase() || '';
    const updated = repos.find(x => x.name === repoName && x.status === 'updated');
    const current = repos.find(x => x.name === repoName && x.status === 'current');
    if (updated) {
      status.style.color = '#7fff7f';
      status.textContent = `✓ updated: ${updated.from} → ${updated.to}`;
      const commitEl = document.getElementById('current-commit');
      if (commitEl) commitEl.textContent = updated.to;
      setTimeout(loadWrappers, 1500);
    } else if (current) {
      status.style.color = '#555';
      status.textContent = `✓ up to date (${current.commit})`;
    } else {
      const checked = installed.checked ?? d.checked ?? 0;
      const upd = installed.updated ?? d.updated ?? 0;
      status.style.color = '#555';
      status.textContent = `checked: ${checked} wrappers, ${upd} updated`;
    }
  } catch (e) {
    status.style.color = '#ff6666';
    status.textContent = `error: ${e.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = '↑ check updates';
  }
}

// ── Filter/search app list ────────────────────────────────────────────────────
let _searchTimer = null;
function filterList() {
  if (currentTab === 'local') {
    const q = document.getElementById('search-input').value.trim();
    if (!q) {
      // Empty query: restore full local list
      clearTimeout(_searchTimer);
      loadLocalWrappers();
      return;
    }
    // Debounced natural-language discover (local + store)
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => discoverTools(), 350);
  } else {
    // Server-side text search for store — debounced
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => loadStoreWrappers(), 400);
  }
}

// ── Suggestion chip click ─────────────────────────────────────────────────────
function clickSuggestion(q) {
  const input = document.getElementById('search-input');
  if (input) { input.value = q; input.focus(); }
  discoverTools();
}

// ── Admin actions ─────────────────────────────────────────────────────────────
async function triggerRepair() {
  const status = document.getElementById('admin-status');
  status.style.color = '#555';
  status.textContent = 'repairing wrappers...';
  try {
    const r = await fetch(`${API}/store/repair`, {
      method: 'POST',
      headers: {Authorization: `Bearer ${TOKEN}`},
    });
    const d = await r.json();
    status.style.color = d.ok ? '#3a7a3a' : '#7a3a3a';
    status.textContent = d.summary || (d.ok ? 'done' : 'failed');
    if (currentTab === 'store') setTimeout(loadStoreWrappers, 1000);
  } catch(e) {
    status.style.color = '#7a3a3a';
    status.textContent = 'error: ' + e.message;
  }
}

async function triggerVersionCheck() {
  const status = document.getElementById('admin-status');
  status.style.color = '#555';
  status.textContent = 'checking updates...';
  try {
    const r = await fetch(`${API}/version-check`, {
      method: 'POST',
      headers: {Authorization: `Bearer ${TOKEN}`},
    });
    const d = await r.json();
    // Response: {ok, installed: {checked, updated, ...}, store: {...}}
    const installed = d.installed || d;
    const checked = installed.checked ?? d.checked ?? 0;
    const updated = installed.updated ?? d.updated ?? 0;
    status.style.color = updated > 0 ? '#7fff7f' : '#3a5a3a';
    status.textContent = `checked: ${checked}, updated: ${updated}`;
    if (updated > 0) setTimeout(loadLocalWrappers, 1500);
  } catch(e) {
    status.style.color = '#7a3a3a';
    status.textContent = 'error: ' + e.message;
  }
}

// ── Utility ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadWrappers();
// Auto-refresh local tab only (store is largely static, don't disrupt browsing)
setInterval(() => { if (currentTab === 'local') loadLocalWrappers(); }, 15000);
</script>
