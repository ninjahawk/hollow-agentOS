version: "3.9"

# Hollow AgentOS — full stack
#
# Default — pulls pre-built image from GHCR, no build step required:
#   docker compose up -d
#
# Build from source (contributors):
#   docker compose up -d --build
#
# With Ollama inside Docker (NVIDIA GPU + nvidia-container-toolkit):
#   docker compose --profile ollama up -d
#
# Dashboard:  http://localhost:7778
# API:        http://localhost:7777
# API docs:   http://localhost:7777/docs

services:
  api:
    image: ghcr.io/ninjahawk/hollow-agentos:latest
    build:
      context: .
      # 'image' above is used as-is when pulled from GHCR.
      # 'build' kicks in only when you run --build or docker compose build.
    container_name: hollow-api
    ports:
      - "7777:7777"
    volumes:
      - ./memory:/agentOS/memory
      - ./workspace:/agentOS/workspace
      - ./config.json:/agentOS/config.json:ro
      - ./logs:/agentOS/logs
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_HOST=http://host.docker.internal:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    image: nginx:alpine
    container_name: hollow-dashboard
    ports:
      - "7778:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: hollow-ollama
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama-models:
