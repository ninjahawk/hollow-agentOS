# HollowOS — mkosi image build configuration
# Builds a minimal bootable Linux image that runs the Hollow interface in kiosk mode.
#
# Prerequisites:
#   sudo apt install mkosi systemd-container
#   (or: pip install mkosi  — version 14+)
#
# Build:
#   sudo mkosi build
#
# Flash to USB (careful — THIS ERASES THE DEVICE):
#   bash build.sh --flash /dev/sdX
#
# Boot result:
#   - Chromium in kiosk mode → http://localhost:7778/apps.html (the Hollow UI)
#   - Hollow agent daemon running as systemd services
#   - No desktop environment visible
#   - First boot: clones hollow repo, pulls Docker images (~3 min with good internet)

[Distribution]
Distribution=debian
Release=bookworm

[Output]
Format=disk
Output=hollowos.img
OutputDirectory=build/
# Compress with zstd for faster USB writes
Compression=zstd

[Content]
# Minimal package set — only what Hollow needs to run
Packages=
    # Base system
    systemd
    systemd-sysv
    dbus
    udev
    upower
    network-manager
    ca-certificates
    curl
    wget
    git
    openssh-client
    # Runtime
    python3
    python3-pip
    # Display (kiosk — no full desktop)
    chromium
    xorg
    xinit
    openbox
    lightdm
    # Container runtime
    docker.io
    docker-compose
    # Utilities
    htop
    less
    nano

# Create the hollow user (uid 1000) for kiosk autologin
# root is uid 0; hollow gets the kiosk session
CreateUsers=hollow

# User configuration — hollow is in the docker group so it can use Docker
# (group membership set in postinstall script)

# Services enabled at boot
EnabledServices=
    NetworkManager
    lightdm
    docker
    hollow-first-boot
    hollow-agent
    hollow-kiosk

# Files to copy into the image
CopyFiles=
    # Systemd units
    units/hollow-first-boot.service:/etc/systemd/system/hollow-first-boot.service
    units/hollow-agent.service:/etc/systemd/system/hollow-agent.service
    units/hollow-kiosk.service:/etc/systemd/system/hollow-kiosk.service
    units/hollow-kiosk.sh:/usr/local/bin/hollow-kiosk.sh
    # First-boot setup script
    scripts/first-boot.sh:/usr/local/bin/hollow-first-boot.sh
    # lightdm autologin config
    rootfs/etc/lightdm/lightdm.conf:/etc/lightdm/lightdm.conf
    # Hollow config directory (user drops their API key here)
    rootfs/etc/hollow.env.example:/etc/hollow/hollow.env.example

# Post-install: fix permissions and add hollow user to docker group
PostInstallationScripts=scripts/postinstall.sh

[Host]
# Build host requirements — at least 2G RAM for the build container
QemuMem=2G
# Reuse apt package cache between builds for speed
CacheDirectory=build/cache/apt
